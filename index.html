<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Telegram Voice Chat - Sanatani Gojo Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root { --bg-dark: #0f1115; --header-dark: #181d22; --btn-dark: #2b3a4a; --text-grey: #8b959d; --tg-blue: #3facf0; --tg-green: #34c759; --tg-red: #ff3b30; --vh: 1vh; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; height: 100vh; height: calc(var(--vh, 1vh) * 100); overflow: hidden; position: relative; }
        .hidden { display: none !important; }
        .top-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--header-dark); }
        .title-area h2 { margin: 0; font-size: 18px; font-weight: 500; }
        .participant-list { flex: 1; overflow-y: auto; padding: 10px 20px 90px 20px; }
        .participant-item { display: flex; align-items: center; padding: 12px; background-color: rgba(255, 255, 255, 0.03); border-radius: 12px; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; margin-right: 15px; overflow: hidden; background-color: var(--tg-blue); }
        .info { flex: 1; display: flex; flex-direction: column; }
        .name { font-size: 16px; font-weight: 500; }
        .status { font-size: 13px; color: var(--text-grey); }
        .status.speaking { color: var(--tg-green); }
        .mic-icon { font-size: 18px; color: var(--text-grey); }
        .mic-icon.green { color: var(--tg-green); }
        .invite-row { display: flex; align-items: center; padding: 15px 12px; color: var(--tg-blue); font-size: 16px; cursor: pointer; }
        .invite-row i { font-size: 20px; margin-right: 20px; }
        .bottom-controls { display: flex; justify-content: space-around; align-items: center; padding: 15px; background-color: var(--header-dark); position: absolute; bottom: 0; left: 0; right: 0; z-index: 20; }
        .control-btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 22px; color: white; background-color: var(--btn-dark); cursor: pointer; }
        .control-btn.leave { background-color: var(--tg-red); }
        .main-mic { width: 65px; height: 65px; font-size: 26px; }
        .main-mic.state-live { background-color: var(--tg-green); }
        .chat-input-area { position: absolute; bottom: 0; left: 0; right: 0; background-color: var(--header-dark); padding: 15px; display: flex; align-items: center; gap: 10px; z-index: 30; }
        .chat-input-area input { flex: 1; background-color: rgba(255,255,255,0.05); border: none; padding: 12px; border-radius: 20px; color: white; outline: none; }
        .tg-toast { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px; border-radius: 25px; font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
        .tg-toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="tg-toast" id="toast-msg">Notification</div>

    <div class="top-header">
        <div class="title-area"><h2 id="vc-title">Voice Chat</h2></div>
    </div>

    <div class="participant-list" id="participant-list">
        <div class="participant-item" id="my-row">
            <div class="avatar" id="my-avatar-container">
                <span id="my-avatar-text">S</span>
            </div>
            <div class="info">
                <span class="name" id="my-name">Sanatani Gojo</span>
                <span class="status" id="my-status">muted</span>
            </div>
            <i class="fa-solid fa-microphone-slash mic-icon" id="my-list-mic"></i>
        </div>

        <div class="invite-row" onclick="copyInviteLink()">
            <i class="fa-solid fa-user-plus"></i>
            <span>Invite Members</span>
        </div>
    </div>

    <div class="bottom-controls" id="main-controls">
        <button class="control-btn" id="speaker-btn" onclick="toggleSpeaker()"><i class="fa-solid fa-volume-high" id="speaker-icon"></i></button>
        <button class="control-btn main-mic state-muted" id="main-mic-btn" onclick="toggleMainMic()"><i class="fa-solid fa-user" id="main-mic-icon"></i></button>
        <button class="control-btn" onclick="openChat()"><i class="fa-solid fa-message"></i></button>
        <button class="control-btn leave" onclick="leaveSession()"><i class="fa-solid fa-phone-slash"></i></button>
    </div>

    <form class="chat-input-area hidden" id="chat-box" onsubmit="sendMessage(event)">
        <i class="fa-regular fa-face-smile" onclick="closeChat()"></i>
        <input type="text" id="chat-input" placeholder="Message">
    </form>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); try { tg.setHeaderColor('#181d22'); } catch(e){} }

        function setViewportHeight() { 
            let vh = window.innerHeight * 0.01;
            if (tg && tg.viewportHeight) vh = tg.viewportHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`); 
        }
        window.addEventListener('resize', setViewportHeight); setViewportHeight();

        // TELEGRAM ID AND PFP LOGIC
        let currentUser = "Sanatani Gojo";
        let currentInitial = "S";
        let photoUrl = null;

        try {
            const user = tg?.initDataUnsafe?.user;
            if (user) {
                currentUser = user.first_name;
                currentInitial = currentUser.charAt(0).toUpperCase();
                photoUrl = user.photo_url || null;
            }
        } catch(e) {}

        document.getElementById('my-name').innerText = currentUser;
        const avatarContainer = document.getElementById('my-avatar-container');
        if (photoUrl) {
            avatarContainer.style.backgroundColor = "transparent";
            avatarContainer.innerHTML = `<img src="${photoUrl}" style="width: 100%; height: 100%; object-fit: cover;">`;
        } else {
            avatarContainer.innerHTML = `<span id="my-avatar-text">${currentInitial}</span>`;
        }

        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast-msg'); toast.innerText = msg; toast.classList.add('show');
            clearTimeout(toastTimeout); toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        let peer = null, myPeerId = null, localStream = null, isLive = false, hasJoinedRoom = false;

        function initVoiceChat() {
            if (typeof Peer === 'undefined') { setTimeout(initVoiceChat, 500); return; }
            try {
                peer = new Peer();
                peer.on('open', id => {
                    myPeerId = id;
                    const roomToJoin = new URLSearchParams(window.location.search).get('room');
                    if (roomToJoin) {
                        showToast("Click the MIC button to join friend!");
                        document.getElementById('vc-title').innerText = "Friend's Room";
                    } else {
                        showToast("Server Connected!");
                    }
                });

                peer.on('call', call => {
                    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                        localStream = stream; syncMicUI(isLive);
                        call.answer(localStream);
                    }).catch(() => call.answer());
                    call.on('stream', stream => playAudioStream(stream, call.peer));
                    call.on('close', () => removeFriend(call.peer));
                });
            } catch(e) {}
        }

        function playAudioStream(stream, id) {
            if(!document.getElementById('audio-' + id)) {
                const audio = document.createElement('audio'); audio.id = 'audio-' + id;
                audio.srcObject = stream; audio.autoplay = true; document.body.appendChild(audio);
                renderFriendUI(id); showToast("Friend Joined!");
            }
        }

        function renderFriendUI(id) {
            if(document.getElementById(`user-${id}`)) return;
            const list = document.getElementById('participant-list');
            const row = document.createElement('div'); row.className = 'participant-item'; row.id = `user-${id}`;
            row.innerHTML = `<div class="avatar" style="background-color: #ff8e8e;"><span>F</span></div><div class="info"><span class="name">Friend</span><span class="status speaking">connected</span></div><i class="fa-solid fa-microphone green mic-icon"></i>`;
            list.insertBefore(row, list.lastElementChild);
        }

        function removeFriend(id) {
            const el = document.getElementById(`user-${id}`); if(el) el.remove();
            const audioEl = document.getElementById('audio-' + id); if(audioEl) audioEl.remove();
            showToast("Friend Left");
        }

        initVoiceChat();

        async function toggleMainMic() {
            isLive = !isLive;
            if (isLive) {
                if (!localStream) {
                    try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } 
                    catch(e) { isLive = false; showToast("Mic Access Denied!"); return; }
                }
                localStream.getAudioTracks()[0].enabled = true; syncMicUI(true);
            } else {
                if (localStream) localStream.getAudioTracks()[0].enabled = false; syncMicUI(false);
            }

            const roomToJoin = new URLSearchParams(window.location.search).get('room');
            if (roomToJoin && isLive && !hasJoinedRoom) {
                hasJoinedRoom = true; showToast("Connecting...");
                const call = peer.call(roomToJoin, localStream);
                call.on('stream', stream => playAudioStream(stream, roomToJoin));
            }
        }

        function syncMicUI(live) {
            document.getElementById('main-mic-btn').className = live ? 'control-btn main-mic state-live' : 'control-btn main-mic state-muted';
            document.getElementById('main-mic-icon').className = live ? 'fa-solid fa-microphone' : 'fa-solid fa-user';
            document.getElementById('my-list-mic').className = live ? 'fa-solid fa-microphone mic-icon green' : 'fa-solid fa-microphone-slash mic-icon';
            document.getElementById('my-status').innerText = live ? 'speaking' : 'muted';
            document.getElementById('my-status').className = live ? 'status speaking' : 'status';
        }

        let isSpeakerHigh = true;
        function toggleSpeaker() { isSpeakerHigh = !isSpeakerHigh; document.getElementById('speaker-icon').className = isSpeakerHigh ? 'fa-solid fa-volume-high' : 'fa-solid fa-volume-low'; showToast(isSpeakerHigh ? "Speaker ON" : "Earpiece ON"); }

        // FIXED LEAVE BUTTON LOGIC (FALLBACK FOR CHROME)
        function leaveSession() {
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); }
            if (peer) peer.destroy();
            showToast("Leaving...");
            setTimeout(() => {
                try {
                    if (tg && tg.close) { tg.close(); } 
                    else { window.location.href = window.location.origin + window.location.pathname; }
                } catch(e) {
                    window.location.href = window.location.origin + window.location.pathname;
                }
            }, 500);
        }

        function copyInviteLink() {
            if(!myPeerId) { showToast("Wait for connection..."); return; }
            const inviteLink = `${window.location.origin}${window.location.pathname}?room=${myPeerId}`;
            const textarea = document.createElement("textarea"); textarea.value = inviteLink; textarea.style.position = "fixed"; document.body.appendChild(textarea); textarea.select();
            try { if(document.execCommand('copy')) showToast("Link copied!"); } catch (err) { alert("Copy link: " + inviteLink); }
            document.body.removeChild(textarea);
        }

        function openChat() { document.getElementById('main-controls').classList.add('hidden'); document.getElementById('chat-box').classList.remove('hidden'); document.getElementById('chat-input').focus(); }
        function closeChat() { document.getElementById('chat-box').classList.add('hidden'); document.getElementById('main-controls').classList.remove('hidden'); }
        function sendMessage(e) { e.preventDefault(); document.getElementById('chat-input').value = ''; closeChat(); }
    </script>
</body>
</html>
