<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Clone VC - Pro Max</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f1115;
            --header-dark: #181d22;
            --btn-dark: #2b3a4a;
            --text-grey: #8b959d;
            --tg-blue: #3facf0;
            --tg-red: #ff3b30;
            --dialog-bg: #1c1c1e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Top Header */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .title-area h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 500;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icons i {
            font-size: 20px;
            color: var(--text-grey);
        }

        /* Participant List */
        .participant-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin-top: 10px;
        }

        .participant-item {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            margin-right: 15px;
            overflow: hidden; /* Ensures PFP stays inside the circle */
        }

        .info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .name {
            font-size: 16px;
            font-weight: 500;
        }

        .status {
            font-size: 13px;
            color: var(--tg-blue);
            margin-top: 2px;
        }

        .mic-icon { font-size: 18px; color: var(--text-grey); }

        .invite-row {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--text-grey);
            font-size: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .invite-row i {
            font-size: 20px;
            margin-right: 25px;
            margin-left: 10px;
        }

        /* Floating Messages Container */
        .floating-messages {
            position: absolute;
            bottom: 100px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
            pointer-events: none;
        }

        .msg-bubble {
            background: rgba(24, 29, 34, 0.9);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideInBottom 0.3s ease forwards;
        }

        @keyframes slideInBottom {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-bubble .small-avatar {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background-color: var(--tg-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            overflow: hidden;
        }

        .msg-bubble span {
            font-size: 14px;
            color: white;
        }

        /* Bottom Controls */
        .bottom-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 10px 25px 10px;
            background-color: transparent;
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: transform 0.3s ease;
            box-sizing: border-box;
        }

        .bottom-controls.hide {
            transform: translateY(100%);
        }

        .control-btn-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: white;
            background-color: var(--btn-dark);
            cursor: pointer;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn.leave { background-color: var(--tg-red); font-size: 26px; }
        
        .main-mic { width: 65px; height: 65px; font-size: 26px; transition: background 0.2s;}
        .main-mic.state-muted { background-color: var(--btn-dark); }
        .main-mic.state-live { background-color: #34c759; }

        /* Chat Input Area */
        .chat-input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #1c1c1d;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 20;
        }

        .chat-input-area.show {
            transform: translateY(0);
        }

        .chat-input-area i.fa-face-smile {
            font-size: 24px;
            color: var(--text-grey);
            cursor: pointer;
        }

        .chat-input-area input {
            flex: 1;
            background-color: rgba(255,255,255,0.05);
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            color: var(--tg-blue);
            background: none;
            border: none;
            font-size: 22px;
            display: none;
            cursor: pointer;
        }

        /* Leave Confirmation Dialog */
        .dialog-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 50;
        }

        .dialog-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .dialog-box {
            background-color: var(--dialog-bg);
            width: 80%;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
        }

        .dialog-box h3 { margin: 0 0 10px 0; font-size: 18px; }
        .dialog-box p { margin: 0 0 20px 0; color: var(--text-grey); font-size: 14px; line-height: 1.4; }
        
        .dialog-actions {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }

        .dialog-actions button {
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 500;
            color: var(--tg-blue);
            cursor: pointer;
        }
        .dialog-actions button.leave-red { color: var(--tg-red); }

    </style>
</head>
<body>

    <div class="top-header">
        <div class="header-left">
            <div class="title-area">
                <h2>Video Chat</h2>
            </div>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-desktop"></i>
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
    </div>

    <div class="participant-list">
        
        <div class="participant-item">
            <div class="avatar" id="my-avatar-container" style="background-color: var(--tg-blue);">
                <span id="my-avatar-text">U</span>
            </div>
            <div class="info">
                <span class="name" id="my-name">User</span>
                <span class="status">this is you</span>
            </div>
            <i class="fa-solid fa-microphone-slash mic-icon"></i>
        </div>

        <div class="invite-row">
            <i class="fa-solid fa-user-plus"></i>
            <span>Invite Members</span>
        </div>
    </div>

    <div class="floating-messages" id="message-container"></div>

    <div class="bottom-controls" id="main-controls">
        <div class="control-btn-wrap">
            <button class="control-btn"><i class="fa-solid fa-volume-high"></i></button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn main-mic state-muted" id="main-mic-btn" onclick="toggleMainMic()">
                <i class="fa-solid fa-user" id="main-mic-icon"></i>
            </button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn" onclick="openChat()"><i class="fa-solid fa-message"></i></button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn leave" onclick="openLeaveDialog()"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

    <div class="chat-input-area" id="chat-box">
        <i class="fa-regular fa-face-smile" onclick="closeChat()"></i>
        <input type="text" id="chat-input" placeholder="Message" oninput="checkInput()">
        <button class="send-btn" id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <div class="dialog-overlay" id="leave-dialog">
        <div class="dialog-box">
            <h3>Leave video chat</h3>
            <p>Are you sure you want to leave this video chat?</p>
            <div class="dialog-actions">
                <button onclick="closeLeaveDialog()">Cancel</button>
                <button class="leave-red" onclick="tg.close()">Leave</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.setHeaderColor('#181d22');

        // Global variables
        let currentUser = "User";
        let currentInitial = "U";
        let photoUrl = null;

        // 1. Fetch Real User Data from Telegram (Including PFP)
        const user = tg.initDataUnsafe?.user;
        if (user) {
            currentUser = user.first_name;
            currentInitial = currentUser.charAt(0).toUpperCase();
            photoUrl = user.photo_url; // GETTING PFP LINK
            
            document.getElementById('my-name').innerText = currentUser;
            
            const avatarContainer = document.getElementById('my-avatar-container');
            
            // If user has a profile picture, show it!
            if (photoUrl) {
                avatarContainer.style.backgroundColor = "transparent"; // Remove blue background
                avatarContainer.innerHTML = `<img src="${photoUrl}" style="width: 100%; height: 100%; object-fit: cover;">`;
            } else {
                // Fallback: If no PFP, show initial letter
                avatarContainer.innerHTML = `<span id="my-avatar-text">${currentInitial}</span>`;
            }
        }

        // 2. Mic Logic
        let isLive = false;
        function toggleMainMic() {
            isLive = !isLive;
            const btn = document.getElementById('main-mic-btn');
            const icon = document.getElementById('main-mic-icon');
            if (isLive) {
                btn.className = 'control-btn main-mic state-live';
                icon.className = 'fa-solid fa-microphone';
            } else {
                btn.className = 'control-btn main-mic state-muted';
                icon.className = 'fa-solid fa-user';
            }
        }

        // 3. Chat UI Logic
        const chatBox = document.getElementById('chat-box');
        const mainControls = document.getElementById('main-controls');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const msgContainer = document.getElementById('message-container');

        function openChat() {
            mainControls.classList.add('hide');
            chatBox.classList.add('show');
            chatInput.focus();
        }

        function closeChat() {
            chatBox.classList.remove('show');
            mainControls.classList.remove('hide');
        }

        function checkInput() {
            if (chatInput.value.trim() !== '') {
                sendBtn.style.display = 'block';
            } else {
                sendBtn.style.display = 'none';
            }
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if(text === '') return;

            // Generate HTML for PFP inside the chat bubble
            let bubbleAvatarHTML = '';
            if (photoUrl) {
                bubbleAvatarHTML = `<img src="${photoUrl}" style="width: 100%; height: 100%; object-fit: cover;">`;
            } else {
                bubbleAvatarHTML = currentInitial;
            }

            // Create floating bubble using the Real Dynamic Name and PFP
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = `
                <div class="small-avatar" style="${photoUrl ? 'background-color: transparent;' : ''}">
                    ${bubbleAvatarHTML}
                </div>
                <span><b>${currentUser}</b> ${text}</span>
            `;
            
            msgContainer.appendChild(bubble);
            chatInput.value = '';
            checkInput();

            // Remove bubble after 4 seconds
            setTimeout(() => {
                bubble.style.opacity = '0';
                bubble.style.transition = 'opacity 0.3s';
                setTimeout(() => bubble.remove(), 300);
            }, 4000);
        }

        // 4. Leave Dialog Logic
        const leaveDialog = document.getElementById('leave-dialog');
        function openLeaveDialog() { leaveDialog.classList.add('show'); }
        function closeLeaveDialog() { leaveDialog.classList.remove('show'); }

    </script>
</body>
</html>
