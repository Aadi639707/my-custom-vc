<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium Voice Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(180deg, #1a2332 0%, #0f1419 100%); color: white; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 420px; height: 100vh; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; position: relative; }
        
        .join-room-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .join-room-content { text-align: center; padding: 40px 30px; background: rgba(255, 255, 255, 0.1); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); max-width: 320px; width: 90%; }
        .join-room-btn { background: linear-gradient(45deg, #3facf0, #34c759); border: none; color: white; padding: 15px 30px; border-radius: 30px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; box-shadow: 0 10px 30px rgba(52, 199, 89, 0.3); margin-top: 20px; }
        
        .participants-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 16px; border-radius: 30px; font-weight: 600; cursor: pointer; z-index: 100; display: flex; align-items: center; gap: 8px; }
        .participants-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .participants-content { background: rgba(30,30,30,0.98); border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .close-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; float: right; font-size: 16px; }
        .participant-item { background: rgba(50,50,50,0.6); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .participant-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(45deg, #3facf0, #8b5cf6); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; }
        
        .music-player { flex: 1; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.5s; }
        .music-player.show { opacity: 1; }
        .album-art { width: min(250px, 70vw); height: min(250px, 70vw); border-radius: 50%; margin: 80px auto 30px; background: linear-gradient(45deg, #1a2332, #2b3a4a); display: flex; align-items: center; justify-content: center; font-size: 5rem; box-shadow: 0 15px 50px rgba(0,0,0,0.6); border: 4px solid rgba(255,255,255,0.05); position: relative; transition: 0.3s; }
        .album-art.speaking { border-color: #34c759; box-shadow: 0 0 40px rgba(52,199,89,0.5); }
        
        .song-info { text-align: center; margin-bottom: 40px; }
        .song-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
        .artist-name { font-size: 1.1rem; color: #3facf0; font-weight: 500; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: auto; padding-bottom: 40px; }
        .control-btn { width: 55px; height: 55px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 1.2rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .play-btn { width: 75px; height: 75px; font-size: 1.8rem; background: #ff3b30; box-shadow: 0 10px 20px rgba(255,59,48,0.3); }
        .play-btn.live { background: #34c759; box-shadow: 0 10px 20px rgba(52,199,89,0.3); }
        
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 9999; font-weight: 500; white-space: nowrap; }
        .toast.show { opacity: 1; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="toast" id="toastMsg">Notification</div>
    
    <div class="container">
        <button id="participantsBtn" class="participants-btn hidden">
            <i class="fa-solid fa-users"></i> <span id="participantsCount" style="margin-left: 5px;">1</span>
        </button>

        <div id="participantsModal" class="participants-modal hidden">
            <div class="participants-content">
                <button class="close-btn" onclick="document.getElementById('participantsModal').classList.add('hidden')">✕</button>
                <h3 style="margin-bottom: 20px; font-size: 1.3rem;">👥 In Call</h3>
                <div id="participantsList"></div>
            </div>
        </div>

        <div id="joinRoomOverlay" class="join-room-overlay">
            <div class="join-room-content">
                <i class="fa-solid fa-microphone-lines" style="font-size: 4rem; color: #3facf0; margin-bottom: 20px;"></i>
                <h2 class="join-room-title" id="joinTitle">Voice Room</h2>
                <p class="join-room-subtitle">Secure peer-to-peer connection</p>
                <button id="joinRoomBtn" class="join-room-btn" onclick="joinCall()">Tap to Join Call</button>
            </div>
        </div>

        <div id="playerContainer" class="music-player">
            <div id="albumArt" class="album-art">
                <span id="myAvatar">S</span>
            </div>
            <div class="song-info">
                <div id="songTitle" class="song-title">Sanatani Gojo</div>
                <div id="artistName" class="artist-name">Mic is Muted</div>
            </div>
            <div class="controls">
                <button class="control-btn" onclick="copyInvite()"><i class="fa-solid fa-user-plus"></i></button>
                <button id="micBtn" class="control-btn play-btn" onclick="toggleMic()"><i class="fa-solid fa-microphone-slash"></i></button>
                <button class="control-btn" onclick="endCall()"><i class="fa-solid fa-phone-slash" style="color: #ff3b30;"></i></button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if(tg) { tg.expand(); try { tg.setHeaderColor('#181d22'); } catch(e){} }
        
        let currentUser = "Sanatani Gojo";
        let currentInitial = "S";
        let peer = null;
        let localStream = null;
        let isMuted = true;
        let roomId = new URLSearchParams(window.location.search).get('room');

        function showToast(msg) {
            const t = document.getElementById('toastMsg');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function initPeer() {
            if (typeof Peer === 'undefined') { setTimeout(initPeer, 500); return; }
            peer = new Peer();
            peer.on('open', id => {
                if(!roomId) roomId = id;
                document.getElementById('joinTitle').innerText = (roomId === id) ? "Create Room" : "Friend's Room";
                showToast("Server Connected!");
            });
            
            peer.on('call', call => {
                if(!localStream) {
                    navigator.mediaDevices.getUserMedia({audio:true}).then(s => {
                        localStream = s; localStream.getAudioTracks()[0].enabled = !isMuted;
                        call.answer(localStream);
                    }).catch(() => call.answer());
                } else {
                    call.answer(localStream);
                }
                call.on('stream', stream => addFriend(stream, call.peer));
                call.on('close', () => removeFriend(call.peer));
            });
        }

        async function joinCall() {
            document.getElementById('joinRoomOverlay').classList.add('hidden');
            document.getElementById('playerContainer').classList.add('show');
            document.getElementById('participantsBtn').classList.remove('hidden');
            addSelfToList();
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({audio:true});
                localStream.getAudioTracks()[0].enabled = false; 
                if(roomId && roomId !== peer.id) {
                    showToast("Connecting to friend...");
                    const call = peer.call(roomId, localStream);
                    call.on('stream', stream => addFriend(stream, roomId));
                }
            } catch(e) { showToast("Mic permission required!"); }
        }

        function toggleMic() {
            if(!localStream) { showToast("Mic not connected yet"); return; }
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted;
            
            const btn = document.getElementById('micBtn');
            const status = document.getElementById('artistName');
            const art = document.getElementById('albumArt');
            
            if(!isMuted) {
                btn.classList.add('live');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                status.innerText = "Speaking...";
                status.style.color = "#34c759";
                art.classList.add('speaking');
            } else {
                btn.classList.remove('live');
                btn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
                status.innerText = "Mic is Muted";
                status.style.color = "#3facf0";
                art.classList.remove('speaking');
            }
        }

        function addFriend(stream, id) {
            if(document.getElementById('audio-'+id)) return;
            const audio = document.createElement('audio');
            audio.id = 'audio-'+id; audio.srcObject = stream; audio.autoplay = true;
            document.body.appendChild(audio);
            
            const list = document.getElementById('participantsList');
            list.innerHTML += `<div class="participant-item" id="user-${id}">
                <div class="participant-avatar" style="background: linear-gradient(45deg, #ff6b6b, #ffa500);">F</div>
                <div style="flex:1"><div style="font-weight:600; font-size:16px;">Friend</div><div style="font-size:12px; color:#34c759; margin-top:3px;">Connected</div></div>
            </div>`;
            updateCount(); showToast("Friend Joined!");
        }

        function removeFriend(id) {
            document.getElementById('user-'+id)?.remove();
            document.getElementById('audio-'+id)?.remove();
            updateCount(); showToast("Friend Left");
        }

        function addSelfToList() {
            document.getElementById('participantsList').innerHTML = `<div class="participant-item">
                <div class="participant-avatar">${currentInitial}</div>
                <div style="flex:1"><div style="font-weight:600; font-size:16px;">${currentUser}</div><div style="font-size:12px; color:#3facf0; margin-top:3px;">This is you</div></div>
            </div>`;
        }

        function updateCount() {
            const count = document.getElementById('participantsList').children.length;
            document.getElementById('participantsCount').innerText = count;
        }

        function copyInvite() {
            if(!peer || !peer.id) { showToast("Wait for connection..."); return; }
            const link = window.location.origin + window.location.pathname + "?room=" + (roomId === peer.id ? peer.id : roomId);
            navigator.clipboard.writeText(link).then(() => showToast("Invite Link Copied!"));
        }

        function endCall() {
            if(localStream) localStream.getTracks().forEach(t => t.stop());
            if(peer) peer.destroy();
            window.location.href = window.location.origin + window.location.pathname;
        }

        document.getElementById('participantsBtn').onclick = () => document.getElementById('participantsModal').classList.remove('hidden');

        initPeer();
    </script>
</body>
</html>
