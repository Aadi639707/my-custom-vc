<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Telegram Clone VC - Final Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f1115;
            --header-dark: #181d22;
            --btn-dark: #2b3a4a;
            --text-grey: #8b959d;
            --tg-blue: #3facf0;
            --tg-green: #34c759;
            --tg-red: #ff3b30;
            --dialog-bg: #1c1c1e;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Top Header */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .title-area h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 500;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icons i {
            font-size: 20px;
            color: var(--text-grey);
            cursor: pointer;
            transition: color 0.2s;
        }
        .header-icons i:active { color: white; }

        /* Participant List */
        .participant-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin-top: 10px;
        }

        .participant-item {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            margin-right: 15px;
            overflow: hidden; 
        }

        .info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .name { font-size: 16px; font-weight: 500; }
        .status { font-size: 13px; color: var(--tg-blue); margin-top: 2px; }
        .status.speaking { color: var(--tg-green); } /* Green status when speaking */
        
        .mic-icon { font-size: 18px; color: var(--text-grey); }
        .mic-icon.green { color: var(--tg-green); } /* Green mic when speaking */

        /* Invite Row */
        .invite-row {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--text-grey);
            font-size: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        .invite-row:active { background-color: rgba(255,255,255,0.08); }

        .invite-row i {
            font-size: 20px;
            margin-right: 25px;
            margin-left: 10px;
        }

        /* Floating Messages Container */
        .floating-messages {
            position: absolute;
            bottom: 120px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
            pointer-events: none;
        }

        .msg-bubble {
            background: rgba(24, 29, 34, 0.9);
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideInBottom 0.3s ease forwards;
        }

        @keyframes slideInBottom {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-bubble .small-avatar {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            overflow: hidden;
        }

        .msg-bubble span { font-size: 14px; color: white; }

        /* Bottom Controls Fixed for Cut-off */
        .bottom-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            /* Added env(safe-area-inset-bottom) and 40px base to lift buttons */
            padding: 15px 10px max(40px, env(safe-area-inset-bottom)) 10px;
            background-color: transparent;
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .bottom-controls.hide { transform: translateY(100%); }

        .control-btn-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: white;
            background-color: var(--btn-dark);
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s;
        }

        .control-btn:active { transform: scale(0.88); }

        .control-btn.leave { background-color: var(--tg-red); font-size: 26px; }
        
        .main-mic { width: 65px; height: 65px; font-size: 26px; transition: background 0.2s, transform 0.15s;}
        .main-mic.state-muted { background-color: var(--btn-dark); }
        .main-mic.state-live { background-color: var(--tg-green); }

        /* Chat Input Area */
        .chat-input-area {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #1c1c1d;
            padding: 10px 15px max(20px, env(safe-area-inset-bottom)) 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 20;
        }

        .chat-input-area.show { transform: translateY(0); }

        .chat-input-area i.fa-face-smile {
            font-size: 24px;
            color: var(--text-grey);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .chat-input-area i.fa-face-smile:active { transform: scale(0.9); }

        .chat-input-area input {
            flex: 1;
            background-color: rgba(255,255,255,0.05);
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            color: var(--tg-blue);
            background: none;
            border: none;
            font-size: 22px;
            display: none;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .send-btn:active { transform: scale(0.9); }

        /* Toast Message */
        .tg-toast {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .tg-toast.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }

        /* Leave Dialog */
        .dialog-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 50;
        }
        .dialog-overlay.show { opacity: 1; pointer-events: auto; }

        .dialog-box {
            background-color: var(--dialog-bg);
            width: 80%;
            border-radius: 12px;
            padding: 20px;
        }
        .dialog-box h3 { margin: 0 0 10px 0; font-size: 18px; }
        .dialog-box p { margin: 0 0 20px 0; color: var(--text-grey); font-size: 14px; line-height: 1.4; }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 20px; }
        .dialog-actions button { background: none; border: none; font-size: 16px; font-weight: 500; color: var(--tg-blue); cursor: pointer; }
        .dialog-actions button.leave-red { color: var(--tg-red); }
    </style>
</head>
<body>

    <div class="tg-toast" id="toast-msg">Notification</div>

    <div class="top-header">
        <div class="header-left">
            <div class="title-area">
                <h2 id="vc-title">Video Chat</h2>
            </div>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-desktop" onclick="showToast('Screen sharing will be available soon')"></i>
            <i class="fa-solid fa-ellipsis-vertical" onclick="showToast('Menu opened')"></i>
        </div>
    </div>

    <div class="participant-list">
        <div class="participant-item">
            <div class="avatar" id="my-avatar-container" style="background-color: var(--tg-blue);">
                <span id="my-avatar-text">U</span>
            </div>
            <div class="info">
                <span class="name" id="my-name">User</span>
                <span class="status" id="my-status">this is you</span>
            </div>
            <i class="fa-solid fa-microphone-slash mic-icon" id="my-list-mic"></i>
        </div>

        <div class="invite-row" onclick="copyInviteLink()">
            <i class="fa-solid fa-user-plus"></i>
            <span>Invite Members</span>
        </div>
    </div>

    <div class="floating-messages" id="message-container"></div>

    <div class="bottom-controls" id="main-controls">
        <div class="control-btn-wrap">
            <button class="control-btn" id="speaker-btn" onclick="toggleSpeaker()">
                <i class="fa-solid fa-volume-high" id="speaker-icon"></i>
            </button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn main-mic state-muted" id="main-mic-btn" onclick="toggleMainMic()">
                <i class="fa-solid fa-user" id="main-mic-icon"></i>
            </button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn" onclick="openChat()"><i class="fa-solid fa-message"></i></button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn leave" onclick="openLeaveDialog()"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

    <div class="chat-input-area" id="chat-box">
        <i class="fa-regular fa-face-smile" onclick="closeChat()"></i>
        <input type="text" id="chat-input" placeholder="Message" oninput="checkInput()">
        <button class="send-btn" id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <div class="dialog-overlay" id="leave-dialog">
        <div class="dialog-box">
            <h3>Leave video chat</h3>
            <p>Are you sure you want to leave this video chat?</p>
            <div class="dialog-actions">
                <button onclick="closeLeaveDialog()">Cancel</button>
                <button class="leave-red" onclick="triggerLeave()">Leave</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.setHeaderColor('#181d22');
        const haptic = tg.HapticFeedback;

        // **यहाँ अपना असली बोट यूज़रनेम डालें** (बिना @ के)
        const botUsername = "YourBotUsername"; 

        const urlParams = new URLSearchParams(window.location.search);
        const currentGroupId = urlParams.get('group_id') || 'Unknown';

        let currentUser = "User";
        let currentInitial = "U";
        let photoUrl = null;

        const user = tg.initDataUnsafe?.user;
        if (user) {
            currentUser = user.first_name;
            currentInitial = currentUser.charAt(0).toUpperCase();
            photoUrl = user.photo_url; 
            
            document.getElementById('my-name').innerText = currentUser;
            const avatarContainer = document.getElementById('my-avatar-container');
            
            if (photoUrl) {
                avatarContainer.style.backgroundColor = "transparent"; 
                avatarContainer.innerHTML = `<img src="${photoUrl}" style="width: 100%; height: 100%; object-fit: cover;">`;
            } else {
                avatarContainer.innerHTML = `<span id="my-avatar-text">${currentInitial}</span>`;
            }
        }

        let toastTimeout;
        function showToast(msg) {
            if(haptic) haptic.impactOccurred('light');
            const toast = document.getElementById('toast-msg');
            toast.innerText = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        let isSpeakerHigh = true;
        function toggleSpeaker() {
            if(haptic) haptic.selectionChanged();
            isSpeakerHigh = !isSpeakerHigh;
            const icon = document.getElementById('speaker-icon');
            if(isSpeakerHigh) {
                icon.className = 'fa-solid fa-volume-high';
                showToast("Audio routed to Speaker");
            } else {
                icon.className = 'fa-solid fa-volume-low';
                showToast("Audio routed to Phone Earpiece");
            }
        }

        // Updated Mic Logic with Name List Sync
        let isLive = false;
        function toggleMainMic() {
            if(haptic) haptic.impactOccurred('medium');
            isLive = !isLive;
            
            // Main Bottom Button
            const btn = document.getElementById('main-mic-btn');
            const icon = document.getElementById('main-mic-icon');
            
            // Top List Elements
            const listMic = document.getElementById('my-list-mic');
            const statusText = document.getElementById('my-status');

            if (isLive) {
                btn.className = 'control-btn main-mic state-live';
                icon.className = 'fa-solid fa-microphone';
                
                // Sync List View to Green & Speaking
                listMic.className = 'fa-solid fa-microphone mic-icon green';
                statusText.innerText = 'speaking';
                statusText.className = 'status speaking';
            } else {
                btn.className = 'control-btn main-mic state-muted';
                icon.className = 'fa-solid fa-user';
                
                // Sync List View back to Grey & this is you
                listMic.className = 'fa-solid fa-microphone-slash mic-icon';
                statusText.innerText = 'this is you';
                statusText.className = 'status';
            }
        }

        function copyInviteLink() {
            const inviteLink = `https://t.me/${botUsername}?start=${currentGroupId}`;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(inviteLink).then(() => {
                    showToast("Link copied to clipboard.");
                });
            } else {
                showToast("Invite Link: " + inviteLink);
            }
        }

        const chatBox = document.getElementById('chat-box');
        const mainControls = document.getElementById('main-controls');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const msgContainer = document.getElementById('message-container');

        function openChat() {
            if(haptic) haptic.selectionChanged();
            mainControls.classList.add('hide');
            chatBox.classList.add('show');
            chatInput.focus();
        }

        function closeChat() {
            if(haptic) haptic.selectionChanged();
            chatBox.classList.remove('show');
            mainControls.classList.remove('hide');
        }

        function checkInput() {
            sendBtn.style.display = chatInput.value.trim() !== '' ? 'block' : 'none';
        }

        function sendMessage() {
            const text = chatInput.value.trim();
            if(text === '') return;
            if(haptic) haptic.impactOccurred('light');

            let bubbleAvatarHTML = photoUrl 
                ? `<img src="${photoUrl}" style="width: 100%; height: 100%; object-fit: cover;">` 
                : currentInitial;

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = `
                <div class="small-avatar" style="${photoUrl ? 'background-color: transparent;' : 'background-color: var(--tg-blue);'}">
                    ${bubbleAvatarHTML}
                </div>
                <span><b>${currentUser}</b> ${text}</span>
            `;
            
            msgContainer.appendChild(bubble);
            chatInput.value = '';
            checkInput();

            setTimeout(() => {
                bubble.style.opacity = '0';
                bubble.style.transition = 'opacity 0.3s';
                setTimeout(() => bubble.remove(), 300);
            }, 4000);
        }

        const leaveDialog = document.getElementById('leave-dialog');
        function openLeaveDialog() { 
            if(haptic) haptic.impactOccurred('medium');
            leaveDialog.classList.add('show'); 
        }
        function closeLeaveDialog() { 
            if(haptic) haptic.selectionChanged();
            leaveDialog.classList.remove('show'); 
        }
        
        function triggerLeave() {
            if(haptic) haptic.impactOccurred('heavy');
            tg.close();
        }

    </script>
</body>
</html>
