<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Telegram Voice Chat</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background-color: #0f1115; /* Telegram Dark Theme Color */
            overflow: hidden; 
        }
        #meet-container { 
            width: 100%; 
            height: 100%; 
        }
        /* Loading Screen UI */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f1115;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(63, 172, 240, 0.2);
            border-top: 4px solid #3facf0; /* Telegram Blue */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>Joining Secure Room...</h2>
        <p style="color: #8b959d; font-size: 14px;">Please wait</p>
    </div>

    <div id="meet-container"></div>

    <script>
        window.onload = () => {
            // 1. Get Telegram User Name (If opened via Telegram)
            let userName = "Telegram User"; 
            
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.expand(); // Full screen
                    window.Telegram.WebApp.setHeaderColor('#0f1115'); // Top bar color
                    
                    if (window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
                        userName = window.Telegram.WebApp.initDataUnsafe.user.first_name;
                    }
                }
            } catch(e) {
                console.log("Not opened in Telegram");
            }

            // 2. Setup Jitsi Meet
            const domain = 'meet.jit.si';
            const options = {
                // Room Name: इसे चाहो तो बदल लेना, बस स्पेस मत देना
                roomName: 'TG_Secure_Voice_Room_2026', 
                width: '100%',
                height: '100%',
                parentNode: document.querySelector('#meet-container'),
                
                // User Details
                userInfo: {
                    displayName: userName
                },
                
                // Core Settings
                configOverwrite: { 
                    prejoinPageEnabled: false, // फालतू की स्क्रीन बंद
                    startWithAudioMuted: true, // जॉइन करते ही म्यूट रहेगा
                    startWithVideoMuted: true, // वीडियो बंद रहेगा
                    disableDeepLinking: true, // Jitsi App डाउनलोड करने का प्रॉम्प्ट नहीं आएगा
                    enableNoAudioDetection: false,
                    enableNoisyMicDetection: false
                },
                
                // UI Settings (Telegram जैसा क्लीन लुक)
                interfaceConfigOverwrite: {
                    SHOW_JITSI_WATERMARK: false,
                    SHOW_WATERMARK_FOR_GUESTS: false,
                    SHOW_BRAND_WATERMARK: false,
                    SHOW_POWERED_BY: false,
                    DEFAULT_BACKGROUND: '#0f1115', // Dark theme
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                        'fodeviceselection', 'hangup', 'profile', 'chat', 'settings', 
                        'videoquality', 'filmstrip', 'feedback', 'stats', 'shortcuts',
                        'tileview', 'select-background', 'download', 'help', 'mute-everyone',
                        'security'
                    ]
                }
            };
            
            // Start the API
            const api = new JitsiMeetExternalAPI(domain, options);

            // Hide loading screen once video conference is ready
            api.addEventListener('videoConferenceJoined', () => {
                document.getElementById('loading-screen').style.display = 'none';
            });
            
            // Handle user leaving
            api.addEventListener('videoConferenceLeft', () => {
                if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.close) {
                    window.Telegram.WebApp.close();
                } else {
                    document.getElementById('loading-screen').style.display = 'flex';
                    document.getElementById('loading-screen').innerHTML = '<h2>You left the chat</h2>';
                }
            });
        };
    </script>

</body>
</html>
