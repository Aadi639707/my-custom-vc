<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Clone VC - Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121619;
            --header-dark: #181d22;
            --btn-dark: #2b3a4a;
            --text-grey: #8b959d;
            --tg-blue: #3facf0;
            --tg-green: #34c759;
            --tg-red: #ff3b30;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Top Header */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: var(--header-dark);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .title-area h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 500;
        }

        .title-area p {
            margin: 2px 0 0;
            font-size: 13px;
            color: var(--text-grey);
        }

        .header-icons i {
            font-size: 18px;
            margin-left: 20px;
            color: #ffffff;
        }

        /* Participant List */
        .participant-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .participant-item {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            transition: background 0.2s;
        }

        .participant-item:active {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            margin-right: 15px;
        }

        .info {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .name {
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status {
            font-size: 13px;
            color: var(--text-grey);
            margin-top: 2px;
        }

        .status.speaking { color: var(--tg-green); }

        .mic-icon { font-size: 16px; }
        .mic-icon.grey { color: #5a646c; }
        .mic-icon.red { color: var(--tg-red); } /* Only for admin muted */
        .mic-icon.green { color: var(--tg-green); }

        /* Invite Members Row */
        .invite-row {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--text-grey);
            font-size: 16px;
            cursor: pointer;
        }

        .invite-row i {
            font-size: 20px;
            margin-right: 25px;
            margin-left: 10px;
        }

        /* Floating Reaction/Chat Bubble (Animated) */
        .floating-reaction {
            position: absolute;
            bottom: 100px; /* Starts slightly lower */
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(to top, rgba(24, 29, 34, 0.9), rgba(24, 29, 34, 0.7));
            padding: 8px 16px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .floating-reaction.show {
            opacity: 1;
            bottom: 130px; /* Slides up into view */
        }

        .floating-reaction .small-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
        }

        /* Bottom Controls */
        .bottom-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 10px 25px 10px;
            background-color: var(--header-dark);
            position: relative;
            z-index: 20;
        }

        .control-btn-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .control-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: white;
            cursor: pointer;
            background-color: var(--btn-dark);
            transition: background 0.2s, transform 0.1s;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn.leave {
            background-color: var(--tg-red);
        }

        .control-label {
            font-size: 12px;
            color: #ffffff;
        }

        /* Main Mic Button States */
        .main-mic {
            width: 65px;
            height: 65px;
            font-size: 26px;
        }

        /* State 1: Muted (Blue) */
        .main-mic.state-muted {
            background-color: var(--btn-dark);
            box-shadow: 0 0 0 4px rgba(63, 172, 240, 0.1);
        }

        /* State 2: Live/Speaking (Green) */
        .main-mic.state-live {
            background-color: var(--tg-green);
            box-shadow: 0 0 15px rgba(52, 199, 89, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(52, 199, 89, 0); }
            100% { box-shadow: 0 0 0 0 rgba(52, 199, 89, 0); }
        }

    </style>
</head>
<body>

    <div class="top-header">
        <div class="header-left">
            <i class="fa-solid fa-arrow-left"></i>
            <div class="title-area">
                <h2>Group VC</h2>
                <p id="participant-count">1 participant</p>
            </div>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
    </div>

    <div class="participant-list" id="participants-container">
        
        <div class="participant-item" id="my-participant-row">
            <div class="avatar" id="my-avatar" style="background-color: var(--tg-blue);">U</div>
            <div class="info">
                <span class="name" id="my-name">You</span>
                <span class="status" id="my-status">listening</span>
            </div>
            <i class="fa-solid fa-microphone-slash mic-icon grey" id="my-mic-indicator"></i>
        </div>

        <div class="invite-row" onclick="alert('Share link will be copied here')">
            <i class="fa-solid fa-user-plus"></i>
            <span>Invite Members</span>
        </div>

    </div>

    <div class="floating-reaction" id="reaction-popup">
        <div class="small-avatar" id="reaction-avatar" style="background-color: #b08d57;">S</div>
        <span style="font-size: 14px; font-weight: 500;" id="reaction-text">User ❤️</span>
    </div>

    <div class="bottom-controls">
        <div class="control-btn-wrap">
            <button class="control-btn"><i class="fa-solid fa-volume-high"></i></button>
            <span class="control-label">Speaker</span>
        </div>
        
        <div class="control-btn-wrap">
            <button class="control-btn main-mic state-muted" id="main-mic-btn" onclick="toggleMainMic()">
                <i class="fa-solid fa-user" id="main-mic-icon"></i>
            </button>
            <span class="control-label" id="main-mic-label">Muted</span>
        </div>

        <div class="control-btn-wrap">
            <button class="control-btn" onclick="simulateReaction()"><i class="fa-solid fa-message"></i></button>
            <span class="control-label">Message</span>
        </div>

        <div class="control-btn-wrap">
            <button class="control-btn leave" onclick="closeApp()"><i class="fa-solid fa-phone-slash"></i></button>
            <span class="control-label">Leave</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.setHeaderColor('#181d22'); 

        // 1. Fetch Real User Data
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('my-name').innerText = user.first_name;
            document.getElementById('my-avatar').innerText = user.first_name.charAt(0).toUpperCase();
        }

        // 2. Main Mic Button Logic (Toggle between Muted/Listening and Live/Speaking)
        let isLive = false;
        function toggleMainMic() {
            isLive = !isLive;
            const btn = document.getElementById('main-mic-btn');
            const icon = document.getElementById('main-mic-icon');
            const label = document.getElementById('main-mic-label');
            const myStatus = document.getElementById('my-status');
            const myMicIndicator = document.getElementById('my-mic-indicator');

            if (!isLive) {
                // Return to Muted/Listening state
                btn.className = 'control-btn main-mic state-muted';
                icon.className = 'fa-solid fa-user';
                label.innerText = 'Muted';
                
                myStatus.innerText = 'listening';
                myStatus.className = 'status';
                myMicIndicator.className = 'fa-solid fa-microphone-slash mic-icon grey';
            } else {
                // Switch to Live/Speaking state
                btn.className = 'control-btn main-mic state-live';
                icon.className = 'fa-solid fa-microphone';
                label.innerText = 'You';
                
                myStatus.innerText = 'speaking';
                myStatus.className = 'status speaking';
                myMicIndicator.className = 'fa-solid fa-microphone mic-icon green';
            }
        }

        // 3. Dynamic Floating Reaction Logic
        let reactionTimeout;
        function showReaction(name, avatarLetter, color, messageOrEmoji) {
            const popup = document.getElementById('reaction-popup');
            document.getElementById('reaction-avatar').innerText = avatarLetter;
            document.getElementById('reaction-avatar').style.backgroundColor = color;
            document.getElementById('reaction-text').innerText = `${name} ${messageOrEmoji}`;
            
            // Show popup
            popup.classList.add('show');

            // Hide after 3 seconds
            clearTimeout(reactionTimeout);
            reactionTimeout = setTimeout(() => {
                popup.classList.remove('show');
            }, 3000);
        }

        // Fake reaction for testing (Tap the Message button to test this)
        function simulateReaction() {
            const emojis = ['❤️', '🔥', '😂', '👍'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            showReaction('Shivu', 'S', '#b08d57', randomEmoji);
        }

        // 4. Function to dynamically add a remote user (Will be used later with backend)
        function addRemoteUser(id, name, status, isMutedByAdmin) {
            // This is just a placeholder function to show how backend will add users
            const container = document.getElementById('participants-container');
            const inviteRow = document.querySelector('.invite-row');
            
            const div = document.createElement('div');
            div.className = 'participant-item';
            div.id = `user-${id}`;
            
            let micClass = isMutedByAdmin ? 'fa-microphone-slash mic-icon red' : 'fa-microphone-slash mic-icon grey';
            let statusClass = status === 'speaking' ? 'status speaking' : 'status';

            div.innerHTML = `
                <div class="avatar" style="background-color: #e8a09f;">${name.charAt(0)}</div>
                <div class="info">
                    <span class="name">${name}</span>
                    <span class="${statusClass}">${status}</span>
                </div>
                <i class="fa-solid ${micClass}"></i>
            `;
            
            // Insert before the invite row
            container.insertBefore(div, inviteRow);
            document.getElementById('participant-count').innerText = (document.querySelectorAll('.participant-item').length) + ' participants';
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
