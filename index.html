<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Telegram Voice Chat</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>

    <style>
        :root {
            --bg-dark: #0f1115; --header-dark: #181d22; --btn-dark: #2b3a4a;
            --text-grey: #8b959d; --tg-blue: #3facf0; --tg-green: #34c759;
            --tg-red: #ff3b30; --vh: 1vh;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; height: calc(var(--vh, 1vh) * 100);
            overflow: hidden; position: relative;
        }

        .hidden { display: none !important; }

        .top-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--header-dark); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .title-area h2 { margin: 0; font-size: 18px; font-weight: 500; }
        .header-icons { display: flex; gap: 20px; }
        .header-icons i { font-size: 20px; color: var(--text-grey); cursor: pointer; }

        .participant-list { flex: 1; overflow-y: auto; padding: 0; padding-bottom: 90px; scroll-behavior: smooth; }
        .participant-item { display: flex; align-items: center; padding: 10px 20px; background-color: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; margin-right: 15px; overflow: hidden; transition: 0.3s; border: 2px solid transparent; }
        .avatar.speaking { border-color: var(--tg-green); box-shadow: 0 0 10px rgba(52,199,89,0.5); }
        .info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .name { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status { font-size: 13px; color: var(--text-grey); margin-top: 2px; }
        .status.speaking { color: var(--tg-green); }
        .mic-icon { font-size: 18px; color: var(--text-grey); }
        .mic-icon.green { color: var(--tg-green); }
        
        .invite-row { display: flex; align-items: center; padding: 15px 20px; color: var(--tg-blue); font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .invite-row i { font-size: 20px; margin-right: 25px; margin-left: 10px; }

        .floating-messages { position: absolute; bottom: 110px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; pointer-events: none; }
        .msg-bubble { background: rgba(24, 29, 34, 0.9); padding: 8px 14px; border-radius: 20px; display: flex; align-items: center; gap: 8px; animation: slideInBottom 0.3s ease forwards; max-width: 80vw; }
        @keyframes slideInBottom { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .msg-bubble span { font-size: 14px; color: white; word-break: break-word; }

        .bottom-controls {
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px 10px calc(15px + env(safe-area-inset-bottom)) 10px;
            background-color: var(--header-dark); position: absolute; bottom: 0; left: 0; right: 0; width: 100%; z-index: 20; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .control-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-btn {
            width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center;
            font-size: 22px; color: white; background-color: var(--btn-dark); cursor: pointer; transition: transform 0.1s ease;
        }
        .control-btn:active { transform: scale(0.88); }
        .control-btn.leave { background-color: var(--tg-red); font-size: 26px; }
        .main-mic { width: 65px; height: 65px; font-size: 26px; }
        .main-mic.state-muted { background-color: var(--btn-dark); }
        .main-mic.state-live { background-color: var(--tg-green); }

        .chat-input-area {
            position: absolute; bottom: 0; left: 0; right: 0; width: 100%; background-color: var(--header-dark);
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 10px; z-index: 30;
        }
        .chat-input-area input { flex: 1; background-color: rgba(255,255,255,0.05); border: none; padding: 12px 15px; border-radius: 20px; color: white; font-size: 16px; outline: none; }
        .send-btn { color: var(--tg-blue); background: none; border: none; font-size: 22px; display: none; cursor: pointer; }

        .join-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; pointer-events: auto; }
        .join-btn { background: var(--tg-blue); border: none; color: white; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 15px rgba(63, 172, 240, 0.3); }
        .join-btn:active { transform: scale(0.95); }

        .tg-toast { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px; border-radius: 25px; font-size: 14px; z-index: 2000; opacity: 0; transition: 0.3s ease; pointer-events: none; text-align: center; width: 80%; }
        .tg-toast.show { opacity: 1; }
        
        .error-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 3000; flex-direction: column; text-align: center; padding: 20px; }
        .error-modal h3 { color: #ff3b30; margin-bottom: 15px; font-size: 24px; }
        .error-modal p { color: #fff; font-size: 16px; margin-bottom: 25px; line-height: 1.6; }
        .copy-btn-large { background: var(--tg-blue); color: white; border: none; padding: 15px 35px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="tg-toast" id="toast-msg">Notification</div>
    
    <div class="error-modal hidden" id="mic-error">
        <i class="fa-solid fa-microphone-slash" style="font-size: 60px; color: #ff3b30; margin-bottom: 20px;"></i>
        <h3>Microphone Blocked</h3>
        <p>App is blocking the microphone.<br><br>Please copy the link and open it in <b>Chrome</b> or <b>Safari</b> to speak.</p>
        <button class="copy-btn-large" onclick="copyAndRedirect()">Copy & Open Browser</button>
    </div>

    <div class="join-overlay" id="join-overlay">
        <i class="fa-solid fa-microphone-lines" style="font-size: 50px; color: var(--tg-blue);"></i>
        <h2 style="margin-top: 15px;">Group Voice Chat</h2>
        <p style="color: var(--text-grey); font-size: 14px;">Tap below to connect</p>
        <button id="real-join-btn" class="join-btn" onclick="startCall()">Join Room</button>
    </div>

    <div class="top-header">
        <div class="header-left">
            <div class="title-area"><h2 id="vc-title">Voice Chat</h2></div>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-desktop" onclick="showToast('Screen sharing coming soon')"></i>
            <i class="fa-solid fa-ellipsis-vertical" onclick="showToast('Menu option')"></i>
        </div>
    </div>

    <div class="participant-list" id="participant-list">
        <div class="participant-item" id="my-row">
            <div class="avatar" id="my-avatar" style="background-color: #ff9500;">S</div>
            <div class="info">
                <span class="name" id="my-name">Sanatani Gojo</span>
                <span class="status" id="my-status">listening</span>
            </div>
            <i class="fa-solid fa-microphone-slash mic-icon" id="my-list-mic"></i>
        </div>

        <div class="invite-row" id="invite-btn" onclick="copyInviteLink()">
            <i class="fa-solid fa-user-plus"></i>
            <span>Invite Members</span>
        </div>
    </div>

    <div class="floating-messages" id="message-container"></div>

    <div class="bottom-controls" id="main-controls">
        <div class="control-btn-wrap">
            <button class="control-btn" onclick="toggleSpeaker()">
                <i class="fa-solid fa-volume-high" id="speaker-icon"></i>
            </button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn main-mic state-muted" id="main-mic-btn" onclick="toggleMainMic()">
                <i class="fa-solid fa-user" id="main-mic-icon"></i>
            </button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn" onclick="openChat()"><i class="fa-solid fa-message"></i></button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn leave" onclick="leaveSession()"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

    <form class="chat-input-area hidden" id="chat-box" onsubmit="sendMessage(event)">
        <i class="fa-regular fa-face-smile" onclick="closeChat()"></i>
        <input type="text" id="chat-input" placeholder="Message" oninput="checkInput()">
        <button type="submit" class="send-btn" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
    </form>

    <script>
        const ROOM_URL = "https://tgvc.daily.co/MWDAHj6kvgx8JYBsUXsQ";
        
        let call = null;
        let isMuted = true;
        let currentUser = "Sanatani Gojo";
        let initial = "S";

        document.addEventListener("DOMContentLoaded", () => {
            try {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                    window.Telegram.WebApp.setHeaderColor('#181d22');
                    
                    if (window.Telegram.WebApp.initDataUnsafe?.user) {
                        currentUser = window.Telegram.WebApp.initDataUnsafe.user.first_name;
                        initial = currentUser.charAt(0).toUpperCase();
                    }
                }
            } catch(e) {}

            document.getElementById('my-name').innerText = currentUser;
            document.getElementById('my-avatar').innerText = initial;
            document.getElementById('my-avatar').style.backgroundColor = getColor(currentUser);
        });

        const colors = ['#ff3b30', '#ff9500', '#ffcc00', '#4cd964', '#5ac8fa', '#007aff', '#5856d6'];
        function getColor(name) { 
            let hash = 0; for(let i=0; i<name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length]; 
        }

        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast-msg'); toast.innerText = msg; toast.classList.add('show');
            clearTimeout(toastTimeout); toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        async function startCall() {
            document.getElementById('join-overlay').style.display = 'none';
            showToast("Connecting...");

            if (typeof window.DailyIframe === 'undefined') {
                showToast("Engine loading, try again...");
                document.getElementById('join-overlay').style.display = 'flex';
                return;
            }

            try {
                if (!call) {
                    // Start exactly as a silent listener
                    call = window.DailyIframe.createCallObject({ 
                        audioSource: false, 
                        videoSource: false 
                    });

                    call.on('participant-joined', handleJoin)
                        .on('participant-updated', handleUpdate)
                        .on('participant-left', handleLeft)
                        .on('active-speaker-change', handleSpeaker)
                        .on('track-started', playAudio)
                        .on('app-message', handleChat)
                        .on('error', e => { console.error(e); });
                }

                await call.join({ url: ROOM_URL, userName: currentUser });
                showToast("Joined Successfully!");
                
            } catch(e) {
                console.error("Join Error:", e);
                document.getElementById('join-overlay').style.display = 'flex';
                showToast("Connection Failed. Check Settings.");
            }
        }

        async function toggleMainMic() {
            if(!call) { showToast("Not connected!"); return; }
            try {
                // Request Permission exactly when the button is clicked
                await call.setLocalAudio(!isMuted);
                isMuted = !isMuted;

                const btn = document.getElementById('main-mic-btn');
                const icon = document.getElementById('main-mic-icon');
                const listMic = document.getElementById('my-list-mic');
                const statusText = document.getElementById('my-status');

                if (!isMuted) {
                    btn.className = 'control-btn main-mic state-live'; icon.className = 'fa-solid fa-microphone';
                    listMic.className = 'fa-solid fa-microphone mic-icon green';
                    statusText.innerText = 'speaking';
                } else {
                    btn.className = 'control-btn main-mic state-muted'; icon.className = 'fa-solid fa-user';
                    listMic.className = 'fa-solid fa-microphone-slash mic-icon';
                    statusText.innerText = 'muted'; 
                    statusText.classList.remove('speaking');
                    document.getElementById('my-avatar').classList.remove('speaking');
                }
            } catch(e) {
                isMuted = true;
                document.getElementById('mic-error').classList.remove('hidden');
            }
        }

        function copyAndRedirect() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                showToast("Copied! Opening Browser...");
                setTimeout(() => {
                    if (window.Telegram?.WebApp?.openLink) {
                        window.Telegram.WebApp.openLink(url);
                    } else {
                        window.open(url, '_blank');
                    }
                }, 1000);
            });
        }

        function handleJoin(e) {
            const p = e.participant;
            if(p.local || document.getElementById(`user-${p.session_id}`)) return;
            
            const list = document.getElementById('participant-list');
            const inviteBtn = document.getElementById('invite-btn');
            const row = document.createElement('div');
            row.className = 'participant-item';
            row.id = `user-${p.session_id}`;
            const name = p.user_name || "User";
            
            row.innerHTML = `
                <div class="avatar" id="avatar-${p.session_id}" style="background-color: ${getColor(name)}">${name.charAt(0).toUpperCase()}</div>
                <div class="info">
                    <span class="name">${name}</span>
                    <span class="status" id="status-${p.session_id}">listening</span>
                </div>
                <i class="fa-solid fa-microphone-slash mic-icon" id="mic-${p.session_id}"></i>
            `;
            list.insertBefore(row, inviteBtn);
        }

        function handleLeft(e) {
            document.getElementById(`user-${e.participant.session_id}`)?.remove();
            document.getElementById(`audio-${e.participant.session_id}`)?.remove();
        }

        function handleUpdate(e) {
            const p = e.participant;
            if (p.local) return;
            const micIcon = document.getElementById(`mic-${p.session_id}`);
            const status = document.getElementById(`status-${p.session_id}`);
            if (micIcon && status) {
                if (p.audio) {
                    micIcon.className = "fa-solid fa-microphone mic-icon green";
                    if(status.innerText !== 'speaking') status.innerText = 'listening';
                } else {
                    micIcon.className = "fa-solid fa-microphone-slash mic-icon";
                    status.innerText = 'muted';
                    status.classList.remove('speaking');
                    document.getElementById(`avatar-${p.session_id}`)?.classList.remove('speaking');
                }
            }
        }

        function handleSpeaker(e) {
            document.querySelectorAll('.status').forEach(el => {
                if(el.innerText === 'speaking') { el.innerText = 'listening'; el.classList.remove('speaking'); }
            });
            document.querySelectorAll('.avatar').forEach(el => el.classList.remove('speaking'));

            const speakerId = e.activeSpeaker?.peerId;
            if (speakerId) {
                const isLocal = (speakerId === call.participants().local.session_id);
                if (isLocal && !isMuted) {
                    document.getElementById('my-status').innerText = 'speaking';
                    document.getElementById('my-status').classList.add('speaking');
                    document.getElementById('my-avatar').classList.add('speaking');
                } else if (!isLocal) {
                    const statusEl = document.getElementById(`status-${speakerId}`);
                    const avatarEl = document.getElementById(`avatar-${speakerId}`);
                    if (statusEl) { statusEl.innerText = 'speaking'; statusEl.classList.add('speaking'); }
                    if (avatarEl) avatarEl.classList.add('speaking');
                }
            }
        }

        function playAudio(e) {
            if (e.track.kind === 'audio' && !e.participant.local) {
                let audioEl = document.getElementById(`audio-${e.participant.session_id}`);
                if (!audioEl) {
                    audioEl = document.createElement('audio');
                    audioEl.id = `audio-${e.participant.session_id}`;
                    audioEl.autoplay = true;
                    document.body.appendChild(audioEl);
                }
                audioEl.srcObject = new MediaStream([e.track]);
            }
        }

        let isSpeakerHigh = true;
        function toggleSpeaker() {
            isSpeakerHigh = !isSpeakerHigh;
            document.getElementById('speaker-icon').className = isSpeakerHigh ? 'fa-solid fa-volume-high' : 'fa-solid fa-volume-low';
            showToast(isSpeakerHigh ? "Speaker ON" : "Earpiece ON");
        }

        function leaveSession() {
            if(call) { call.leave(); call.destroy(); }
            if (window.Telegram?.WebApp?.close) window.Telegram.WebApp.close();
            else window.location.reload();
        }

        function copyInviteLink() {
            navigator.clipboard.writeText(window.location.href).then(() => showToast("Invite link copied!"));
        }

        const chatBox = document.getElementById('chat-box');
        const mainControls = document.getElementById('main-controls');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const msgContainer = document.getElementById('message-container');

        function openChat() { mainControls.classList.add('hidden'); chatBox.classList.remove('hidden'); chatInput.focus(); }
        function closeChat() { chatInput.blur(); window.focus(); setTimeout(() => { chatBox.classList.add('hidden'); mainControls.classList.remove('hidden'); sendBtn.style.display='none'; }, 100); }
        function checkInput() { sendBtn.style.display = chatInput.value.trim() !== '' ? 'block' : 'none'; }

        function sendMessage(e) {
            e.preventDefault(); 
            const text = chatInput.value.trim(); 
            if(text === '') return;
            if(call) call.sendAppMessage({ text: text, name: currentUser }, '*');
            displayMsg(currentUser, text);
            chatInput.value = ''; closeChat();
        }

        function handleChat(e) { displayMsg(e.data.name, e.data.text); }

        function displayMsg(name, text) {
            const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
            bubble.innerHTML = `<span><b>${name}:</b> ${text}</span>`;
            msgContainer.appendChild(bubble);
            setTimeout(() => { bubble.style.opacity = '0'; setTimeout(() => bubble.remove(), 5000); }, 5000);
        }
    </script>
</body>
</html>
