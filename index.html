<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Telegram Voice Chat</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        :root { --bg-dark: #0f1115; --header-dark: #181d22; --btn-dark: #2b3a4a; --text-grey: #8b959d; --tg-blue: #3facf0; --tg-green: #34c759; --tg-red: #ff3b30; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; }
        .hidden { display: none !important; }

        /* CAPTCHA */
        #captcha-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; z-index: 5000; position: absolute; width: 100%; background: var(--bg-dark); }
        .captcha-box { background: var(--header-dark); padding: 30px; border-radius: 20px; text-align: center; width: 100%; max-width: 350px; border: 1px solid rgba(255,255,255,0.05); }
        .captcha-box h2 { margin-top: 0; font-size: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--tg-blue); }
        .math-problem { font-size: 28px; font-weight: bold; margin: 20px 0; letter-spacing: 2px; }
        .captcha-input { width: 100%; padding: 15px; font-size: 18px; text-align: center; border-radius: 10px; border: 2px solid var(--btn-dark); background: rgba(255,255,255,0.05); color: white; outline: none; margin-bottom: 20px; }
        .captcha-input:focus { border-color: var(--tg-blue); }
        .btn-submit { width: 100%; background: var(--tg-blue); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-submit:active { transform: scale(0.95); }
        .error-text { color: var(--tg-red); font-size: 14px; margin-top: 10px; display: none; }

        /* JOIN OVERLAY */
        .join-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .join-btn { background: var(--tg-blue); border: none; color: white; padding: 15px 40px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 15px rgba(63, 172, 240, 0.3); }
        .join-btn:active { transform: scale(0.95); }

        /* UI ELEMENTS */
        .top-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; background: var(--header-dark); }
        .title-area h2 { margin: 0; font-size: 18px; font-weight: 500; }
        .header-icons { display: flex; gap: 20px; }
        .header-icons i { font-size: 20px; color: var(--text-grey); cursor: pointer; }
        
        .participant-list { flex: 1; overflow-y: auto; padding: 0; padding-bottom: 90px; scroll-behavior: smooth; }
        .participant-item { display: flex; align-items: center; padding: 10px 20px; background-color: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; margin-right: 15px; overflow: hidden; transition: 0.3s; border: 2px solid transparent; color: white; }
        .avatar.speaking { border-color: var(--tg-green); box-shadow: 0 0 10px rgba(52,199,89,0.5); }
        .info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .name { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status { font-size: 13px; color: var(--text-grey); margin-top: 2px; }
        .status.speaking { color: var(--tg-green); }
        .mic-icon { font-size: 18px; color: var(--text-grey); }
        .mic-icon.green { color: var(--tg-green); }
        .invite-row { display: flex; align-items: center; padding: 15px 20px; color: var(--tg-blue); font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .invite-row i { font-size: 20px; margin-right: 25px; margin-left: 10px; }

        /* CHAT */
        .floating-messages { position: absolute; bottom: 110px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; pointer-events: none; }
        .msg-bubble { background: rgba(24, 29, 34, 0.9); padding: 8px 14px; border-radius: 20px; display: flex; align-items: center; gap: 8px; animation: slideInBottom 0.3s ease forwards; max-width: 80vw; }
        @keyframes slideInBottom { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .msg-bubble span { font-size: 14px; color: white; word-break: break-word; }
        .chat-input-area { position: absolute; bottom: 0; left: 0; right: 0; width: 100%; background-color: var(--header-dark); padding: 10px 15px calc(15px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 10px; z-index: 30; }
        .chat-input-area i.fa-face-smile { font-size: 24px; color: var(--text-grey); cursor: pointer; }
        .chat-input-area input { flex: 1; background-color: rgba(255,255,255,0.05); border: none; padding: 12px 15px; border-radius: 20px; color: white; font-size: 16px; outline: none; }
        .send-btn { color: var(--tg-blue); background: none; border: none; font-size: 22px; display: none; cursor: pointer; }

        /* CONTROLS */
        .bottom-controls { display: flex; justify-content: space-around; align-items: center; padding: 10px 10px calc(15px + env(safe-area-inset-bottom)) 10px; background-color: var(--header-dark); position: absolute; bottom: 0; left: 0; right: 0; width: 100%; z-index: 20; border-top: 1px solid rgba(255,255,255,0.05); }
        .control-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 22px; color: white; background-color: var(--btn-dark); cursor: pointer; transition: transform 0.1s ease; }
        .control-btn:active { transform: scale(0.88); }
        .control-btn.leave { background-color: var(--tg-red); font-size: 26px; }
        .main-mic { width: 65px; height: 65px; font-size: 26px; }
        .main-mic.state-muted { background-color: var(--btn-dark); }
        .main-mic.state-live { background-color: var(--tg-green); }
        .tg-toast { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px; border-radius: 25px; font-size: 14px; z-index: 2000; opacity: 0; transition: 0.3s ease; pointer-events: none; text-align: center; }
        .tg-toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="tg-toast" id="toast-msg">Notification</div>

    <div id="captcha-screen">
        <div class="captcha-box">
            <h2><i class="fa-solid fa-shield-halved"></i> Security Check</h2>
            <p style="color: #8b959d; font-size: 14px;">Verify you are human to enter.</p>
            <div class="math-problem" id="math-problem">5 + 4 = ?</div>
            <input type="number" id="captcha-answer" class="captcha-input" placeholder="Enter answer">
            <button class="btn-submit" onclick="verifyCaptcha()">Verify</button>
            <div class="error-text" id="error-msg">Incorrect answer, try again!</div>
        </div>
    </div>

    <div class="join-overlay hidden" id="join-overlay">
        <i class="fa-solid fa-microphone-lines" style="font-size: 50px; color: var(--tg-blue);"></i>
        <h2 style="margin-top: 15px;">Group Voice Chat</h2>
        <p style="color: var(--text-grey); font-size: 14px;">Connection secure. Tap to connect.</p>
        <button class="join-btn" onclick="startCall()">Join Room</button>
    </div>

    <div id="main-ui" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
        <div class="top-header">
            <div class="header-left">
                <div class="title-area"><h2 id="vc-title">Premium VC</h2></div>
            </div>
            <div class="header-icons">
                <i class="fa-solid fa-desktop" onclick="showToast('Screen sharing coming soon')"></i>
                <i class="fa-solid fa-ellipsis-vertical" onclick="showToast('Menu option')"></i>
            </div>
        </div>

        <div class="participant-list" id="participant-list">
            <div class="participant-item" id="my-row">
                <div class="avatar" id="my-avatar" style="background-color: #ff9500;">U</div>
                <div class="info">
                    <span class="name" id="my-name">User</span>
                    <span class="status" id="my-status">listening</span>
                </div>
                <i class="fa-solid fa-microphone-slash mic-icon" id="my-list-mic"></i>
            </div>
            <div class="invite-row" id="invite-btn" onclick="copyInviteLink()">
                <i class="fa-solid fa-user-plus"></i>
                <span>Invite Members</span>
            </div>
        </div>

        <div class="floating-messages" id="message-container"></div>

        <div class="bottom-controls" id="main-controls">
            <div class="control-btn-wrap">
                <button class="control-btn" onclick="showToast('Speaker ON')"><i class="fa-solid fa-volume-high" id="speaker-icon"></i></button>
            </div>
            <div class="control-btn-wrap">
                <button class="control-btn main-mic state-muted" id="main-mic-btn" onclick="toggleMainMic()"><i class="fa-solid fa-user" id="main-mic-icon"></i></button>
            </div>
            <div class="control-btn-wrap">
                <button class="control-btn" onclick="openChat()"><i class="fa-solid fa-message"></i></button>
            </div>
            <div class="control-btn-wrap">
                <button class="control-btn leave" onclick="leaveSession()"><i class="fa-solid fa-phone-slash"></i></button>
            </div>
        </div>

        <form class="chat-input-area hidden" id="chat-box" onsubmit="sendMessage(event)">
            <i class="fa-regular fa-face-smile" onclick="closeChat()"></i>
            <input type="text" id="chat-input" placeholder="Message..." oninput="checkInput()">
            <button type="submit" class="send-btn" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
        </form>
    </div>

    <script>
        // ==========================================
        // DYNAMIC ROOM FIX (TELEGRAM STRIP BYPASS)
        // ==========================================
        let ROOM_ID = null;
        
        // Telegram WebApp bug bypass: check standard search param AND raw href
        if (window.location.search.includes('room=')) {
            ROOM_ID = new URLSearchParams(window.location.search).get('room');
        } else if (window.location.href.includes('room=')) {
            ROOM_ID = window.location.href.split('room=')[1].split('&')[0];
        }

        // If still no room found, generate one
        if (!ROOM_ID) {
            ROOM_ID = "group_" + Math.random().toString(36).substring(2, 9);
            window.history.replaceState(null, '', '?room=' + ROOM_ID);
        }

        // VPS SIGNALING SERVER & BOT URL
        const SERVER_URL = "https://criticism-diameter-awareness-suse.trycloudflare.com"; 
        const BOT_INVITE_LINK = "https://t.me/YourBotUsername_bot"; // LEAVE BUTTON YAHAN REDIRECT HOGA

        let socket;
        let myPeer;
        let localStream;
        let isMuted = true;
        let currentUser = "User";
        let initial = "U";
        let num1, num2, correctAnswer;
        const peers = {};

        // INIT
        document.addEventListener("DOMContentLoaded", () => {
            try {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                    window.Telegram.WebApp.setHeaderColor('#181d22');
                    if (window.Telegram.WebApp.initDataUnsafe?.user) {
                        currentUser = window.Telegram.WebApp.initDataUnsafe.user.first_name;
                        initial = currentUser.charAt(0).toUpperCase();
                    }
                }
            } catch(e) {}

            document.getElementById('my-name').innerText = currentUser;
            document.getElementById('my-avatar').innerText = initial;
            document.getElementById('my-avatar').style.backgroundColor = getColor(currentUser);

            if (localStorage.getItem('vc_device_verified') === 'true') {
                document.getElementById('captcha-screen').classList.add('hidden');
                document.getElementById('join-overlay').classList.remove('hidden');
            } else {
                generateCaptcha();
            }
        });

        // CAPTCHA
        function generateCaptcha() {
            num1 = Math.floor(Math.random() * 10) + 1;
            num2 = Math.floor(Math.random() * 10) + 1;
            correctAnswer = num1 + num2;
            document.getElementById('math-problem').innerText = `${num1} + ${num2} = ?`;
            document.getElementById('captcha-answer').value = '';
            document.getElementById('error-msg').style.display = 'none';
        }

        function verifyCaptcha() {
            if (parseInt(document.getElementById('captcha-answer').value) === correctAnswer) {
                localStorage.setItem('vc_device_verified', 'true');
                document.getElementById('captcha-screen').classList.add('hidden');
                document.getElementById('join-overlay').classList.remove('hidden');
            } else {
                document.getElementById('error-msg').style.display = 'block';
                generateCaptcha();
            }
        }

        const colors = ['#ff3b30', '#ff9500', '#ffcc00', '#4cd964', '#5ac8fa', '#007aff', '#5856d6'];
        function getColor(name) { 
            let hash = 0; for(let i=0; i<name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length]; 
        }

        function showToast(msg) {
            const toast = document.getElementById('toast-msg'); toast.innerText = msg; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // WEBRTC & SOCKET CONNECTION
        async function startCall() {
            document.getElementById('join-overlay').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            showToast("Joining Room: " + ROOM_ID);

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                localStream.getAudioTracks()[0].enabled = false;
                isMuted = true;

                // Force WebSocket connection for Cloudflare stability
                socket = io(SERVER_URL, { transports: ["websocket", "polling"] });

                // PUBLIC PEERJS SERVER FOR 100% VOICE STABILITY (Bypasses Cloudflare limits)
                myPeer = new Peer(); 

                myPeer.on('open', id => {
                    socket.emit('join-room', ROOM_ID, id);
                    showToast("Connected Successfully!");
                });

                myPeer.on('call', call => {
                    call.answer(localStream);
                    const remoteName = call.metadata?.name || "Connecting...";
                    const remoteInit = call.metadata?.initial || "?";
                    
                    call.on('stream', userAudioStream => {
                        playRemoteStream(userAudioStream, call.peer, remoteName, remoteInit);
                    });
                });

                myPeer.on('connection', conn => {
                    conn.on('data', data => {
                        if (data.type === 'chat') {
                            displayMsg(data.name, data.text);
                        } else if (data.name && data.initial) {
                            updateParticipantUI(conn.peer, data.name, data.initial);
                        }
                    });
                    conn.on('open', () => {
                        conn.send({ name: currentUser, initial: initial });
                    });
                });

                socket.on('user-connected', userId => {
                    connectToNewUser(userId, localStream);
                });

                socket.on('user-disconnected', userId => {
                    if (peers[userId]) peers[userId].close();
                    removeParticipantUI(userId);
                });

            } catch(e) {
                console.error("Mic Error:", e);
                alert("Please allow Microphone access.");
            }
        }

        function connectToNewUser(userId, stream) {
            const call = myPeer.call(userId, stream, { metadata: { name: currentUser, initial: initial } });
            call.on('stream', userAudioStream => { playRemoteStream(userAudioStream, userId); });
            call.on('close', () => { removeParticipantUI(userId); });
            peers[userId] = call;

            const conn = myPeer.connect(userId);
            conn.on('open', () => { conn.send({ name: currentUser, initial: initial }); });
            conn.on('data', data => {
                if (data.type === 'chat') displayMsg(data.name, data.text);
                else if (data.name && data.initial) updateParticipantUI(userId, data.name, data.initial);
            });
        }

        function playRemoteStream(stream, userId, name = "Connecting...", init = "?") {
            if (!document.getElementById('audio-' + userId)) {
                const audio = document.createElement('audio');
                audio.id = 'audio-' + userId;
                audio.srcObject = stream;
                audio.autoplay = true;
                document.body.appendChild(audio);
                addParticipantUI(userId, name, init);
            }
        }

        // MIC
        function toggleMainMic() {
            if(localStream) {
                isMuted = !isMuted;
                localStream.getAudioTracks()[0].enabled = !isMuted;
                
                const btn = document.getElementById('main-mic-btn');
                const icon = document.getElementById('main-mic-icon');
                const listMic = document.getElementById('my-list-mic');
                const statusText = document.getElementById('my-status');

                if (!isMuted) {
                    btn.className = 'control-btn main-mic state-live'; icon.className = 'fa-solid fa-microphone';
                    listMic.className = 'fa-solid fa-microphone mic-icon green'; statusText.innerText = 'speaking';
                    document.getElementById('my-avatar').classList.add('speaking');
                } else {
                    btn.className = 'control-btn main-mic state-muted'; icon.className = 'fa-solid fa-user';
                    listMic.className = 'fa-solid fa-microphone-slash mic-icon'; statusText.innerText = 'muted'; 
                    document.getElementById('my-avatar').classList.remove('speaking');
                }
            } else { showToast("Microphone not ready yet."); }
        }

        // CHAT
        const chatBox = document.getElementById('chat-box');
        const mainControls = document.getElementById('main-controls');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const msgContainer = document.getElementById('message-container');

        function openChat() { mainControls.classList.add('hidden'); chatBox.classList.remove('hidden'); chatInput.focus(); }
        function closeChat() { chatInput.blur(); window.focus(); setTimeout(() => { chatBox.classList.add('hidden'); mainControls.classList.remove('hidden'); sendBtn.style.display = 'none'; }, 100); }
        function checkInput() { sendBtn.style.display = chatInput.value.trim() !== '' ? 'block' : 'none'; }

        function sendMessage(e) {
            e.preventDefault(); 
            const text = chatInput.value.trim(); 
            if(text === '') return;
            
            Object.keys(peers).forEach(peerId => {
                const conn = myPeer.connect(peerId);
                conn.on('open', () => { conn.send({ type: 'chat', name: currentUser, text: text }); });
            });
            displayMsg(currentUser, text); chatInput.value = ''; closeChat();
        }

        function displayMsg(name, text) {
            const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
            bubble.innerHTML = `<span><b>${name}:</b> ${text}</span>`;
            msgContainer.appendChild(bubble);
            setTimeout(() => { bubble.style.opacity = '0'; setTimeout(() => bubble.remove(), 5000); }, 5000);
        }

        // INVITE
        function copyInviteLink() {
            const link = window.location.href;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(link).then(() => showToast("Room link copied!"));
            } else {
                let tempInput = document.createElement("input"); tempInput.value = link;
                document.body.appendChild(tempInput); tempInput.select(); document.execCommand("copy");
                document.body.removeChild(tempInput); showToast("Room link copied!");
            }
        }

        // LEAVE (FORCE REDIRECT TO BOT)
        function leaveSession() {
            try {
                if(localStream) localStream.getTracks().forEach(track => track.stop());
                if(socket) socket.disconnect();
                if(myPeer) myPeer.destroy();
            } catch(e) {}
            
            try {
                if (window.Telegram?.WebApp) window.Telegram.WebApp.close();
            } catch(e) {}
            
            // Telegram close command ignore karne par sidha Bot par phek dega
            window.location.href = BOT_INVITE_LINK;
        }

        // UI
        function addParticipantUI(uid, name, init) {
            if(document.getElementById(`user-${uid}`)) return;
            const list = document.getElementById('participant-list'); const inviteBtn = document.getElementById('invite-btn');
            const row = document.createElement('div'); row.className = 'participant-item'; row.id = `user-${uid}`;
            row.innerHTML = `
                <div class="avatar" style="background-color: ${getColor(name)}">${init}</div>
                <div class="info"><span class="name">${name}</span><span class="status">listening</span></div>
                <i class="fa-solid fa-microphone-slash mic-icon"></i>`;
            list.insertBefore(row, inviteBtn);
        }
        function updateParticipantUI(uid, name, init) {
            const row = document.getElementById(`user-${uid}`);
            if (row) { row.querySelector('.name').innerText = name; row.querySelector('.avatar').innerText = init; row.querySelector('.avatar').style.backgroundColor = getColor(name); } 
            else { addParticipantUI(uid, name, init); }
        }
        function removeParticipantUI(uid) {
            const el = document.getElementById(`user-${uid}`); if(el) el.remove();
            const aud = document.getElementById(`audio-${uid}`); if(aud) aud.remove();
        }
    </script>
</body>
</html>
