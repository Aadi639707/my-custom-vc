<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Secure VC</title>
    <!-- Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: var(--tg-theme-bg-color, #1c1c1d); /* Telegram Dark Theme */
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #8e8e93;
        }

        .participants-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            padding: 20px;
            overflow-y: auto;
            align-content: start;
        }

        .participant {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #3478f6;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            position: relative;
            box-shadow: 0 0 15px rgba(52, 120, 246, 0.4); /* Speaking glowing effect */
        }

        /* Mic indicator */
        .mic-status {
            position: absolute;
            bottom: 0;
            right: 0;
            background-color: #34c759;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #1c1c1d;
        }

        .mic-status.muted {
            background-color: #ff3b30;
        }

        .participant-name {
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .controls {
            padding: 20px;
            display: flex;
            justify-content: space-around;
            background-color: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.9);
        }

        .btn-mute {
            background-color: #3478f6;
            color: white;
        }

        .btn-leave {
            background-color: #ff3b30;
            color: white;
        }

    </style>
</head>
<body>

    <div class="header">
        <h2>Secure Group VC</h2>
        <p id="user-status">1 participant</p>
    </div>

    <div class="participants-grid" id="grid">
        <!-- Main User Avatar -->
        <div class="participant">
            <div class="avatar" id="my-avatar">
                U
                <div class="mic-status" id="my-mic-icon">🎤</div>
            </div>
            <div class="participant-name" id="my-name">You</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-mute" id="mute-btn" onclick="toggleMute()">🎙️</button>
        <button class="btn btn-leave" onclick="leaveVC()">❌</button>
    </div>

    <script>
        // Telegram Web App Initialization
        const tg = window.Telegram.WebApp;
        tg.expand(); // Open in full height

        // Fetch User Info from Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('my-name').innerText = user.first_name;
            document.getElementById('my-avatar').innerText = user.first_name.charAt(0);
        }

        // Mute/Unmute Logic (Visual for now)
        let isMuted = false;
        function toggleMute() {
            isMuted = !isMuted;
            const muteBtn = document.getElementById('mute-btn');
            const micIcon = document.getElementById('my-mic-icon');
            
            if (isMuted) {
                muteBtn.style.backgroundColor = '#ff3b30';
                muteBtn.innerText = '🔇';
                micIcon.classList.add('muted');
                micIcon.innerText = '🔇';
            } else {
                muteBtn.style.backgroundColor = '#3478f6';
                muteBtn.innerText = '🎙️';
                micIcon.classList.remove('muted');
                micIcon.innerText = '🎤';
            }
        }

        function leaveVC() {
            tg.close(); // Close the mini app and return to chat
        }
    </script>
</body>
              </html>
