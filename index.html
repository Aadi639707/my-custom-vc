<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Voice Chat Clone</title>
    
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #1c1c1d; --surface: #2c2c2e; --blue: #0a84ff; --green: #30d158; --red: #ff453a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* VC Header (Telegram Style) */
        .header { padding: 20px 20px 10px; text-align: center; z-index: 10; background: var(--bg); }
        .title { font-size: 19px; font-weight: 600; margin: 0; }
        .subtitle { color: var(--green); font-size: 14px; margin-top: 5px; font-weight: 500; }
        
        /* Participants Grid */
        .grid-container { flex: 1; overflow-y: auto; padding: 20px; }
        .grid { display: flex; flex-wrap: wrap; gap: 25px 15px; justify-content: center; align-content: flex-start; }
        .user-card { width: 85px; display: flex; flex-direction: column; align-items: center; }
        .avatar-container { position: relative; width: 75px; height: 75px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; font-weight: 600; color: white; transition: 0.2s; box-shadow: 0 0 0 0px var(--bg); }
        
        /* Speaking Animation Ring */
        .avatar.speaking { box-shadow: 0 0 0 3px var(--green); transform: scale(1.05); }
        
        /* Mic Status Badge */
        .mic-status { position: absolute; bottom: 0; right: 0; background: var(--surface); width: 26px; height: 26px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 11px; border: 3px solid var(--bg); color: #8e8e93; }
        .mic-status.live { color: var(--green); }
        
        .user-name { margin-top: 8px; font-size: 13px; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #f2f2f7; font-weight: 500; }
        
        /* Bottom Controls (Telegram Style) */
        .bottom-bar { display: flex; justify-content: space-around; align-items: center; padding: 15px 30px 35px; background: var(--bg); border-top: 1px solid rgba(255,255,255,0.05); }
        .side-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--surface); border: none; color: white; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .side-btn.leave { color: var(--red); }
        
        /* Massive Main Mic Button */
        .main-mic { width: 85px; height: 85px; border-radius: 50%; border: none; background: var(--blue); color: white; font-size: 32px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: center; }
        .main-mic.live { background: var(--green); box-shadow: 0 4px 15px rgba(48, 209, 88, 0.3); }
        .main-mic:active { transform: scale(0.9); }
        
        /* Join Screen Overlay */
        .join-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .join-btn { background: var(--blue); border: none; color: white; padding: 16px 50px; border-radius: 30px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 15px rgba(10, 132, 255, 0.3); }
    </style>
</head>
<body>

    <div class="join-overlay" id="overlay">
        <div style="width: 100px; height: 100px; border-radius: 50%; background: rgba(10, 132, 255, 0.1); display: flex; justify-content: center; align-items: center; margin-bottom: 20px;">
            <i class="fa-solid fa-microphone-lines" style="font-size: 45px; color: var(--blue);"></i>
        </div>
        <h2 style="margin: 0; font-size: 24px;">Voice Chat</h2>
        <p style="color: #8e8e93; margin-top: 8px;">15-20 Members Supported</p>
        <button class="join-btn" onclick="startVC()">Join VC</button>
    </div>

    <div class="header">
        <h2 class="title" id="roomTitle">Group VC</h2>
        <div class="subtitle"><span id="userCount">1</span> listening</div>
    </div>

    <div class="grid-container">
        <div class="grid" id="userGrid">
            
            <div class="user-card" id="my-card">
                <div class="avatar-container">
                    <div class="avatar" style="background: #ff9500;" id="my-avatar">S</div>
                    <div class="mic-status" id="my-mic-status"><i class="fa-solid fa-microphone-slash"></i></div>
                </div>
                <div class="user-name" id="my-name">Sanatani Gojo</div>
            </div>

        </div>
    </div>

    <div class="bottom-bar">
        <button class="side-btn" onclick="copyLink()"><i class="fa-solid fa-user-plus"></i></button>
        <button class="main-mic" id="mainMicBtn" onclick="toggleMic()"><i class="fa-solid fa-microphone-slash"></i></button>
        <button class="side-btn leave" onclick="leaveChat()"><i class="fa-solid fa-phone-slash"></i></button>
    </div>

    <script>
        // ============================================
        // यहाँ अपनी बिल्कुल नई AGORA APP ID डालें 👇
        // ============================================
        const APP_ID = "YOUR_AGORA_APP_ID_HERE"; 
        const CHANNEL_NAME = "global_vc_room";
        
        // Telegram Web App API Settings
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); try { tg.setHeaderColor('#1c1c1d'); } catch(e){} }
        
        let userName = "Sanatani Gojo";
        let initial = "S";

        try {
            if (tg?.initDataUnsafe?.user) {
                userName = tg.initDataUnsafe.user.first_name;
                initial = userName.charAt(0).toUpperCase();
            }
        } catch(e) {}

        document.getElementById('my-name').innerText = userName;
        document.getElementById('my-avatar').innerText = initial;

        // Avatar Colors Generator
        const colors = ['#ff3b30', '#ff9500', '#ffcc00', '#4cd964', '#5ac8fa', '#007aff', '#5856d6', '#ff2d55'];
        function getColor(uid) { return colors[String(uid).charCodeAt(0) % colors.length]; }
        document.getElementById('my-avatar').style.background = getColor(userName);

        // Agora RTC Engine Logic
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localAudioTrack = null;
        let isMuted = true;
        let remoteUsers = {};

        async function startVC() {
            if(APP_ID === "YOUR_AGORA_APP_ID_HERE") {
                alert("Please add your Agora App ID in the code first!");
                return;
            }
            
            document.getElementById('overlay').style.display = 'none';
            
            try {
                // Join the 20-person server room
                await client.join(APP_ID, CHANNEL_NAME, null, null);
                localAudioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await client.publish([localAudioTrack]);
                
                // Keep mic muted by default
                localAudioTrack.setMuted(true);
                
                client.on("user-published", handleUserJoined);
                client.on("user-unpublished", handleUserLeft);
                
                // The magic: Detect who is speaking and show Green Ring
                client.enableAudioVolumeIndicator();
                client.on("volume-indicator", volumes => {
                    volumes.forEach(vol => {
                        if(vol.uid === client.uid) {
                            document.getElementById('my-avatar').classList.toggle('speaking', vol.level > 5 && !isMuted);
                        } else {
                            const avatarEl = document.getElementById('avatar-' + vol.uid);
                            if(avatarEl) avatarEl.classList.toggle('speaking', vol.level > 5);
                        }
                    });
                });

            } catch (error) {
                console.error("Connection Error:", error);
                alert("Connection failed! Check network or App ID.");
            }
        }

        async function handleUserJoined(user, mediaType) {
            await client.subscribe(user, mediaType);
            remoteUsers[user.uid] = user;
            
            if (mediaType === "audio") {
                user.audioTrack.play(); // Play their voice
                
                // Add their Avatar to the Grid
                if(!document.getElementById('card-' + user.uid)) {
                    const grid = document.getElementById('userGrid');
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.id = 'card-' + user.uid;
                    
                    const name = "User " + String(user.uid).substring(0,4);
                    const bg = getColor(user.uid);

                    card.innerHTML = `
                        <div class="avatar-container">
                            <div class="avatar" id="avatar-${user.uid}" style="background: ${bg}">${name.charAt(0)}</div>
                            <div class="mic-status live"><i class="fa-solid fa-microphone"></i></div>
                        </div>
                        <div class="user-name">${name}</div>
                    `;
                    grid.appendChild(card);
                    updateUserCount();
                }
            }
        }

        function handleUserLeft(user) {
            delete remoteUsers[user.uid];
            const card = document.getElementById('card-' + user.uid);
            if(card) card.remove(); // Remove them from grid
            updateUserCount();
        }

        function updateUserCount() {
            const count = Object.keys(remoteUsers).length + 1; // +1 for you
            document.getElementById('userCount').innerText = count;
        }

        // Toggle Mic just like Telegram
        function toggleMic() {
            if(!localAudioTrack) return;
            
            isMuted = !isMuted;
            localAudioTrack.setMuted(isMuted);
            
            const btn = document.getElementById('mainMicBtn');
            const micStatus = document.getElementById('my-mic-status');
            
            if(!isMuted) {
                btn.classList.add('live');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                micStatus.classList.add('live');
                micStatus.innerHTML = '<i class="fa-solid fa-microphone"></i>';
            } else {
                btn.classList.remove('live');
                btn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
                micStatus.classList.remove('live');
                micStatus.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
                document.getElementById('my-avatar').classList.remove('speaking');
            }
        }

        function copyLink() {
            const link = window.location.href;
            navigator.clipboard.writeText(link).then(() => {
                alert("Group VC Link Copied!");
            });
        }

        function leaveChat() {
            if(localAudioTrack) {
                localAudioTrack.stop();
                localAudioTrack.close();
            }
            client.leave();
            window.location.reload(); // Reset screen
        }
    </script>
</body>
</html>
