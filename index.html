<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Telegram Clone VC - Stable</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root { --bg-dark: #0f1115; --header-dark: #181d22; --btn-dark: #2b3a4a; --text-grey: #8b959d; --tg-blue: #3facf0; --tg-green: #34c759; --tg-red: #ff3b30; --vh: 1vh; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; height: calc(var(--vh, 1vh) * 100); overflow: hidden; position: relative; }
        .hidden { display: none !important; }
        .top-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; }
        .participant-list { flex: 1; overflow-y: auto; padding: 0; padding-bottom: 90px; }
        .participant-item { display: flex; align-items: center; padding: 10px 20px; background-color: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; margin-right: 15px; overflow: hidden; }
        .info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .name { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status { font-size: 13px; color: var(--tg-blue); margin-top: 2px; }
        .status.speaking { color: var(--tg-green); }
        .mic-icon { font-size: 18px; color: var(--text-grey); }
        .mic-icon.green { color: var(--tg-green); }
        .invite-row { display: flex; align-items: center; padding: 15px 20px; color: var(--text-grey); font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .invite-row i { font-size: 20px; margin-right: 25px; margin-left: 10px; }
        .floating-messages { position: absolute; bottom: 110px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; pointer-events: none; }
        .msg-bubble { background: rgba(24, 29, 34, 0.9); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; animation: slideInBottom 0.3s ease forwards; }
        @keyframes slideInBottom { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .msg-bubble .small-avatar { width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; overflow: hidden; }
        .msg-bubble span { font-size: 14px; color: white; }
        .bottom-controls { display: flex; justify-content: space-around; align-items: center; padding: 10px 10px calc(15px + env(safe-area-inset-bottom)) 10px; background-color: var(--bg-dark); position: absolute; bottom: 0; left: 0; right: 0; width: 100%; z-index: 20; }
        .control-btn { width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; font-size: 22px; color: white; background-color: var(--btn-dark); cursor: pointer; transition: transform 0.1s ease; }
        .control-btn:active { transform: scale(0.88); }
        .control-btn.leave { background-color: var(--tg-red); font-size: 26px; }
        .main-mic { width: 65px; height: 65px; font-size: 26px; }
        .main-mic.state-muted { background-color: var(--btn-dark); }
        .main-mic.state-live { background-color: var(--tg-green); }
        .chat-input-area { position: absolute; bottom: 0; left: 0; right: 0; width: 100%; background-color: var(--header-dark); padding: 10px 15px calc(15px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 10px; z-index: 30; }
        .chat-input-area input { flex: 1; background-color: rgba(255,255,255,0.05); border: none; padding: 10px 15px; border-radius: 20px; color: white; font-size: 16px; outline: none; }
        .tg-toast { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%) scale(0.9); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px; border-radius: 25px; font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
        .tg-toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
    </style>
</head>
<body>
    <div class="tg-toast" id="toast-msg">Notification</div>
        <div class="top-header"><div class="header-left"><div class="title-area"><h2 id="vc-title">Voice Chat</h2></div></div><div class="header-icons"><i class="fa-solid fa-desktop" onclick="showToast('Not active')"></i></div></div>
    <div class="participant-list" id="participant-list">
        <div class="participant-item" id="my-row"><div class="avatar" id="my-avatar-container" style="background-color: var(--tg-blue);"><span id="my-avatar-text">U</span></div><div class="info"><span class="name" id="my-name">User</span><span class="status" id="my-status">this is you</span></div><i class="fa-solid fa-microphone-slash mic-icon" id="my-list-mic"></i></div>
        <div class="invite-row" onclick="copyInviteLink()"><i class="fa-solid fa-user-plus"></i><span>Invite Members</span></div>
    </div>
    <div class="floating-messages" id="message-container"></div>
    <div class="bottom-controls" id="main-controls">
        <button class="control-btn" onclick="toggleSpeaker()"><i class="fa-solid fa-volume-high" id="speaker-icon"></i></button>
        <button class="control-btn main-mic state-muted" id="main-mic-btn" onclick="toggleMainMic()"><i class="fa-solid fa-user" id="main-mic-icon"></i></button>
        <button class="control-btn" onclick="openChat()"><i class="fa-solid fa-message"></i></button>
        <button class="control-btn leave" onclick="leaveSession()"><i class="fa-solid fa-phone-slash"></i></button>
    </div>
    <form class="chat-input-area hidden" id="chat-box" onsubmit="sendMessage(event)">
        <i class="fa-regular fa-face-smile" onclick="closeChat()"></i>
        <input type="text" id="chat-input" placeholder="Message" oninput="checkInput()">
        <button type="submit" class="send-btn" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
    </form>
        <script>
        let tg = window.Telegram?.WebApp;
        function showToast(msg) { const toast = document.getElementById('toast-msg'); toast.innerText = msg; toast.classList.add('show'); setTimeout(() => { toast.classList.remove('show'); }, 2500); }
        function setViewportHeight() { let vh = window.innerHeight * 0.01; if (tg && tg.viewportHeight) vh = tg.viewportHeight * 0.01; document.documentElement.style.setProperty('--vh', `${vh}px`); }
        window.addEventListener('resize', setViewportHeight); setViewportHeight();
        let peer, localStream, isLive = false;
        function initVoiceChat() {
            if (typeof Peer === 'undefined') { setTimeout(initVoiceChat, 500); return; }
            peer = new Peer();
            peer.on('open', id => { showToast("Connected!"); const room = new URLSearchParams(window.location.search).get('room'); if (room) startMicAndCall(room); });
            peer.on('call', call => {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => { localStream = stream; localStream.getAudioTracks()[0].enabled = false; call.answer(localStream); }).catch(() => call.answer());
                call.on('stream', stream => playAudioStream(stream, call.peer));
            });
        }
        function startMicAndCall(hostId) {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                localStream = stream; localStream.getAudioTracks()[0].enabled = false;
                const call = peer.call(hostId, localStream);
                call.on('stream', stream => playAudioStream(stream, hostId));
            }).catch(() => showToast("Mic permission required"));
        }
        function playAudioStream(stream, id) { const audio = document.createElement('audio'); audio.srcObject = stream; audio.autoplay = true; document.body.appendChild(audio); renderFriendUI(id); }
        function renderFriendUI(id) { if(document.getElementById('user-'+id)) return; const list = document.getElementById('participant-list'); const row = document.createElement('div'); row.className = 'participant-item'; row.id = 'user-'+id; row.innerHTML = `<div class="avatar" style="background-color: #ff8e8e;"><span>F</span></div><div class="info"><span class="name">Friend</span><span class="status speaking">connected</span></div><i class="fa-solid fa-microphone green mic-icon"></i>`; list.insertBefore(row, list.lastElementChild); }
        function removeFriend(id) { const el = document.getElementById('user-'+id); if(el) el.remove(); const audio = document.getElementById('audio-'+id); if(audio) audio.remove(); }
        async function toggleMainMic() {
            isLive = !isLive;
            if (isLive) {
                if (!localStream) localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                localStream.getAudioTracks()[0].enabled = true;
                document.getElementById('main-mic-btn').className = 'control-btn main-mic state-live';
            } else {
                if (localStream) localStream.getAudioTracks()[0].enabled = false;
                document.getElementById('main-mic-btn').className = 'control-btn main-mic state-muted';
            }
        }
        function copyInviteLink() { const link = window.location.origin + window.location.pathname + "?room=" + peer.id; navigator.clipboard.writeText(link).then(() => showToast("Link copied!")); }
        function openChat() { document.getElementById('main-controls').classList.add('hidden'); document.getElementById('chat-box').classList.remove('hidden'); }
        function closeChat() { document.getElementById('chat-box').classList.add('hidden'); document.getElementById('main-controls').classList.remove('hidden'); }
        function sendMessage(e) { e.preventDefault(); document.getElementById('chat-input').value = ''; closeChat(); }
        initVoiceChat();
    </script>
</body>
</html>
