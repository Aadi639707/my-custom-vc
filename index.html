<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Telegram Clone VC - Keyboard & UI Fix</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f1115;
            --header-dark: #181d22;
            --btn-dark: #2b3a4a;
            --text-grey: #8b959d;
            --tg-blue: #3facf0;
            --tg-green: #34c759;
            --tg-red: #ff3b30;
            --dialog-bg: #1c1c1e;
            --vh: 1vh;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; height: calc(var(--vh, 1vh) * 100);
            overflow: hidden; position: relative;
        }

        /* Top Header */
        .top-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .title-area h2 { margin: 0; font-size: 18px; font-weight: 500; }
        .header-icons { display: flex; gap: 20px; }
        .header-icons i { font-size: 20px; color: var(--text-grey); cursor: pointer; transition: color 0.2s; }
        .header-icons i:active { color: white; }

        /* NOW PLAYING MUSIC BANNER */
        .music-banner {
            background-color: rgba(63, 172, 240, 0.1);
            border-left: 3px solid var(--tg-blue);
            padding: 10px 20px; display: flex; align-items: center; gap: 15px;
            display: none; animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .music-banner .music-icon {
            width: 40px; height: 40px; border-radius: 8px; background-color: var(--tg-blue); 
            display: flex; justify-content: center; align-items: center; font-size: 18px; color: white; box-shadow: 0 0 10px rgba(63, 172, 240, 0.5);
        }
        .music-banner .music-info { flex: 1; overflow: hidden; }
        .music-banner .music-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .music-banner .music-status { font-size: 12px; color: var(--tg-blue); margin-top: 2px; }

        /* Participant List */
        .participant-list {
            flex: 1; overflow-y: auto; padding: 0; margin-top: 0; padding-bottom: 90px; 
            /* Added smooth scrolling */
            scroll-behavior: smooth;
        }

        .participant-item {
            display: flex; align-items: center; padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .avatar {
            width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 18px; font-weight: bold; margin-right: 15px; overflow: hidden; 
        }

        .info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .name { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status { font-size: 13px; color: var(--tg-blue); margin-top: 2px; }
        .status.speaking { color: var(--tg-green); }
        .mic-icon { font-size: 18px; color: var(--text-grey); }
        .mic-icon.green { color: var(--tg-green); }

        .invite-row { display: flex; align-items: center; padding: 15px 20px; color: var(--text-grey); font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .invite-row i { font-size: 20px; margin-right: 25px; margin-left: 10px; }

        /* Floating Messages Container */
        .floating-messages {
            position: absolute; bottom: 110px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; pointer-events: none;
        }
        .msg-bubble {
            background: rgba(24, 29, 34, 0.9); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; animation: slideInBottom 0.3s ease forwards;
        }
        @keyframes slideInBottom { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .msg-bubble .small-avatar { width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; overflow: hidden; }
        .msg-bubble span { font-size: 14px; color: white; }

        /* Bottom Controls */
        .bottom-controls {
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px 10px calc(15px + env(safe-area-inset-bottom)) 10px;
            background-color: var(--bg-dark); position: absolute; bottom: 0; left: 0; right: 0; width: 100%; z-index: 20; 
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .bottom-controls.hide { transform: translateY(150%); }
        .control-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-btn {
            width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center;
            font-size: 22px; color: white; background-color: var(--btn-dark); cursor: pointer; transition: transform 0.15s ease, background 0.2s;
        }
        .control-btn:active { transform: scale(0.88); }
        .control-btn.leave { background-color: var(--tg-red); font-size: 26px; }
        .main-mic { width: 65px; height: 65px; font-size: 26px; }
        .main-mic.state-muted { background-color: var(--btn-dark); }
        .main-mic.state-live { background-color: var(--tg-green); }

        /* Chat Input Area */
        .chat-input-area {
            position: absolute; bottom: 0; left: 0; right: 0; width: 100%; background-color: var(--header-dark);
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 10px;
            transform: translateY(150%); transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 30;
        }
        .chat-input-area.show { transform: translateY(0); }
        .chat-input-area i.fa-face-smile { font-size: 24px; color: var(--text-grey); cursor: pointer; }
        .chat-input-area input { flex: 1; background-color: rgba(255,255,255,0.05); border: none; padding: 10px 15px; border-radius: 20px; color: white; font-size: 16px; outline: none; }
        .send-btn { color: var(--tg-blue); background: none; border: none; font-size: 22px; display: none; cursor: pointer; }

        /* Toast Message */
        .tg-toast {
            position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%) scale(0.9);
            background-color: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px; border-radius: 25px; font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        .tg-toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
    </style>
</head>
<body>

    <audio id="bg-audio-player" style="display: none;"></audio>
    <div class="tg-toast" id="toast-msg">Notification</div>

    <div class="top-header">
        <div class="header-left">
            <div class="title-area">
                <h2 id="vc-title">Video Chat</h2>
            </div>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-desktop" onclick="showToast('Screen sharing not active')"></i>
            <i class="fa-solid fa-ellipsis-vertical" onclick="showToast('Menu opened')"></i>
        </div>
    </div>

    <div class="music-banner" id="music-banner">
        <div class="music-icon"><i class="fa-solid fa-music"></i></div>
        <div class="music-info">
            <div class="music-title" id="playing-title">Song Name</div>
            <div class="music-status">Now Playing 🎵</div>
        </div>
        <i class="fa-solid fa-forward-step" style="font-size: 20px; cursor:pointer;" onclick="requestSkip()"></i>
    </div>

    <div class="participant-list" id="participant-list">
        <div class="participant-item">
            <div class="avatar" id="my-avatar-container" style="background-color: var(--tg-blue);">
                <span id="my-avatar-text">U</span>
            </div>
            <div class="info">
                <span class="name" id="my-name">User</span>
                <span class="status" id="my-status">this is you</span>
            </div>
            <i class="fa-solid fa-microphone-slash mic-icon" id="my-list-mic"></i>
        </div>

        <div class="invite-row" onclick="copyInviteLink()">
            <i class="fa-solid fa-user-plus"></i>
            <span>Invite Members</span>
        </div>
    </div>

    <div class="floating-messages" id="message-container"></div>

    <div class="bottom-controls" id="main-controls">
        <div class="control-btn-wrap">
            <button class="control-btn" id="speaker-btn" onclick="toggleSpeaker()">
                <i class="fa-solid fa-volume-high" id="speaker-icon"></i>
            </button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn main-mic state-muted" id="main-mic-btn" onclick="toggleMainMic()">
                <i class="fa-solid fa-user" id="main-mic-icon"></i>
            </button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn" onclick="openChat()"><i class="fa-solid fa-message"></i></button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn leave" onclick="tg.close()"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

    <div class="chat-input-area" id="chat-box">
        <i class="fa-regular fa-face-smile" onclick="closeChat()"></i>
        <input type="text" id="chat-input" placeholder="Message" oninput="checkInput()">
        <button class="send-btn" id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script>
        // --- PERFECT VIEWPORT SYNC FOR TELEGRAM KEYBOARD ---
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.setHeaderColor('#181d22');
        const haptic = tg.HapticFeedback;

        function setViewportHeight() { 
            // Use Telegram's actual visible height when keyboard opens
            let vh = (tg.viewportHeight || window.innerHeight) * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`); 
        }
        tg.onEvent('viewportChanged', setViewportHeight);
        window.addEventListener('resize', setViewportHeight); 
        setViewportHeight();

        // --- BOT CONFIG ---
        const botUsername = "YourBotUsername"; 
        const BACKEND_URL = "http://localhost:3000"; 
        const urlParams = new URLSearchParams(window.location.search);
        const currentGroupId = urlParams.get('group_id') || 'test_group';

        let currentUser = "User";
        let currentInitial = "U";
        let photoUrl = null;

        const user = tg.initDataUnsafe?.user;
        if (user) {
            currentUser = user.first_name;
            currentInitial = currentUser.charAt(0).toUpperCase();
            photoUrl = user.photo_url; 
            document.getElementById('my-name').innerText = currentUser;
            const avatarContainer = document.getElementById('my-avatar-container');
            if (photoUrl) {
                avatarContainer.style.backgroundColor = "transparent"; 
                avatarContainer.innerHTML = `<img src="${photoUrl}" style="width: 100%; height: 100%; object-fit: cover;">`;
            } else {
                avatarContainer.innerHTML = `<span id="my-avatar-text">${currentInitial}</span>`;
            }
        }

        let toastTimeout;
        function showToast(msg) {
            if(haptic) haptic.impactOccurred('light');
            const toast = document.getElementById('toast-msg'); toast.innerText = msg; toast.classList.add('show');
            clearTimeout(toastTimeout); toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        // --- SOCKET.IO & AUDIO LOGIC ---
        const socket = io(BACKEND_URL, { transports: ['websocket', 'polling'] });
        const audioPlayer = document.getElementById('bg-audio-player');
        const musicBanner = document.getElementById('music-banner');
        const playingTitle = document.getElementById('playing-title');

        document.body.addEventListener('click', function unlockAudio() {
            audioPlayer.play().then(() => audioPlayer.pause()).catch(e => {});
            document.body.removeEventListener('click', unlockAudio);
        }, { once: true });

        socket.on('connect', () => { socket.emit('join_room', `group_${currentGroupId}`); });

        socket.on('track_changed', (state) => {
            if (state.currentTrack) {
                musicBanner.style.display = 'flex'; playingTitle.innerText = state.currentTrack.title;
                audioPlayer.src = `${BACKEND_URL}/audio_cache/${state.currentTrack.videoId}.m4a`;
                audioPlayer.currentTime = state.currentTime;
                if (state.isPlaying) audioPlayer.play().catch(e => {});
            } else {
                musicBanner.style.display = 'none'; audioPlayer.pause(); audioPlayer.src = "";
            }
        });
        socket.on('sync_pause', (data) => { audioPlayer.currentTime = data.pauseTime; audioPlayer.pause(); showToast(`Paused by ${data.userName}`); });
        socket.on('sync_play', (data) => { audioPlayer.currentTime = data.resumeTime; audioPlayer.play(); showToast(`Resumed by ${data.userName}`); });
        socket.on('session_ended', (data) => { musicBanner.style.display = 'none'; audioPlayer.pause(); showToast(data.message || "Stream ended"); });
        function requestSkip() { if(haptic) haptic.impactOccurred('medium'); socket.emit('request_skip', { groupId: currentGroupId, userName: currentUser }); showToast("Skipping track..."); }

        // --- UI CONTROLS ---
        let isSpeakerHigh = true;
        function toggleSpeaker() {
            if(haptic) haptic.selectionChanged();
            isSpeakerHigh = !isSpeakerHigh;
            document.getElementById('speaker-icon').className = isSpeakerHigh ? 'fa-solid fa-volume-high' : 'fa-solid fa-volume-low';
            showToast(isSpeakerHigh ? "Speaker ON" : "Earpiece ON");
        }

        let isLive = false;
        function toggleMainMic() {
            if(haptic) haptic.impactOccurred('medium');
            isLive = !isLive;
            document.getElementById('main-mic-btn').className = isLive ? 'control-btn main-mic state-live' : 'control-btn main-mic state-muted';
            document.getElementById('main-mic-icon').className = isLive ? 'fa-solid fa-microphone' : 'fa-solid fa-user';
            document.getElementById('my-list-mic').className = isLive ? 'fa-solid fa-microphone mic-icon green' : 'fa-solid fa-microphone-slash mic-icon';
            const statusText = document.getElementById('my-status');
            statusText.innerText = isLive ? 'speaking' : 'this is you';
            statusText.className = isLive ? 'status speaking' : 'status';
        }

        function copyInviteLink() {
            const inviteLink = `https://t.me/${botUsername}?start=${currentGroupId}`;
            navigator.clipboard ? navigator.clipboard.writeText(inviteLink).then(() => showToast("Link copied!")) : showToast("Invite: " + inviteLink);
        }

        // --- CHAT LOGIC WITH KEYBOARD & AUTO-CLOSE FIXES ---
        const chatBox = document.getElementById('chat-box');
        const mainControls = document.getElementById('main-controls');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const msgContainer = document.getElementById('message-container');

        function openChat() { 
            mainControls.classList.add('hide'); 
            chatBox.classList.add('show'); 
            chatInput.focus(); 
        }
        
        function closeChat() { 
            chatInput.blur(); // Ensures keyboard closes
            chatBox.classList.remove('show'); 
            mainControls.classList.remove('hide'); 
        }
        
        function checkInput() { sendBtn.style.display = chatInput.value.trim() !== '' ? 'block' : 'none'; }

        // Close chat if user taps on the participant list background
        document.getElementById('participant-list').addEventListener('click', () => {
            if(chatBox.classList.contains('show')) closeChat();
        });

        function sendMessage() {
            const text = chatInput.value.trim();
            if(text === '') return;
            if(haptic) haptic.impactOccurred('light');

            const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
            bubble.innerHTML = `<div class="small-avatar" style="${photoUrl ? 'background-color: transparent;' : 'background-color: var(--tg-blue);'}">
                ${photoUrl ? `<img src="${photoUrl}" style="width: 100%; height: 100%; object-fit: cover;">` : currentInitial}</div>
                <span><b>${currentUser}</b> ${text}</span>`;
            
            msgContainer.appendChild(bubble); 
            chatInput.value = ''; 
            checkInput();
            
            // Auto close the chat to bring buttons back
            closeChat();

            setTimeout(() => { bubble.style.opacity = '0'; setTimeout(() => bubble.remove(), 300); }, 4000);
        }
    </script>
</body>
</html>
