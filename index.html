<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Telegram Clone VC - Free Call</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>

    <style>
        :root {
            --bg-dark: #0f1115; --header-dark: #181d22; --btn-dark: #2b3a4a;
            --text-grey: #8b959d; --tg-blue: #3facf0; --tg-green: #34c759;
            --tg-red: #ff3b30; --dialog-bg: #1c1c1e; --vh: 1vh;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0; padding: 0; background-color: var(--bg-dark); color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; height: calc(var(--vh, 1vh) * 100);
            overflow: hidden; position: relative;
        }

        .hidden { display: none !important; }

        .top-header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .title-area h2 { margin: 0; font-size: 18px; font-weight: 500; }
        .header-icons { display: flex; gap: 20px; }
        .header-icons i { font-size: 20px; color: var(--text-grey); cursor: pointer; }

        /* Participant List */
        .participant-list { flex: 1; overflow-y: auto; padding: 0; padding-bottom: 90px; scroll-behavior: smooth; }
        .participant-item { display: flex; align-items: center; padding: 10px 20px; background-color: rgba(255, 255, 255, 0.03); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: bold; margin-right: 15px; overflow: hidden; }
        .info { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .name { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status { font-size: 13px; color: var(--tg-blue); margin-top: 2px; }
        .status.speaking { color: var(--tg-green); }
        .mic-icon { font-size: 18px; color: var(--text-grey); }
        .mic-icon.green { color: var(--tg-green); }
        .invite-row { display: flex; align-items: center; padding: 15px 20px; color: var(--text-grey); font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .invite-row i { font-size: 20px; margin-right: 25px; margin-left: 10px; }

        /* Floating Messages */
        .floating-messages { position: absolute; bottom: 110px; left: 15px; display: flex; flex-direction: column; gap: 8px; z-index: 10; pointer-events: none; }
        .msg-bubble { background: rgba(24, 29, 34, 0.9); padding: 6px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; animation: slideInBottom 0.3s ease forwards; }
        @keyframes slideInBottom { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .msg-bubble .small-avatar { width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold; overflow: hidden; }
        .msg-bubble span { font-size: 14px; color: white; }

        /* Bottom Controls */
        .bottom-controls {
            display: flex; justify-content: space-around; align-items: center;
            padding: 10px 10px calc(15px + env(safe-area-inset-bottom)) 10px;
            background-color: var(--bg-dark); position: absolute; bottom: 0; left: 0; right: 0; width: 100%; z-index: 20; 
        }
        .control-btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-btn {
            width: 55px; height: 55px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center;
            font-size: 22px; color: white; background-color: var(--btn-dark); cursor: pointer; transition: transform 0.1s ease;
        }
        .control-btn:active { transform: scale(0.88); }
        .control-btn.leave { background-color: var(--tg-red); font-size: 26px; }
        .main-mic { width: 65px; height: 65px; font-size: 26px; }
        .main-mic.state-muted { background-color: var(--btn-dark); }
        .main-mic.state-live { background-color: var(--tg-green); }

        /* Chat Input Area */
        .chat-input-area {
            position: absolute; bottom: 0; left: 0; right: 0; width: 100%; background-color: var(--header-dark);
            padding: 10px 15px calc(15px + env(safe-area-inset-bottom)) 15px; display: flex; align-items: center; gap: 10px; z-index: 30;
        }
        .chat-input-area i.fa-face-smile { font-size: 24px; color: var(--text-grey); cursor: pointer; }
        .chat-input-area input { flex: 1; background-color: rgba(255,255,255,0.05); border: none; padding: 10px 15px; border-radius: 20px; color: white; font-size: 16px; outline: none; }
        .send-btn { color: var(--tg-blue); background: none; border: none; font-size: 22px; display: none; cursor: pointer; }

        /* Toast Message */
        .tg-toast {
            position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%) scale(0.9);
            background-color: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px; border-radius: 25px; font-size: 14px; z-index: 100; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        .tg-toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
    </style>
</head>
<body>

    <div class="tg-toast" id="toast-msg">Notification</div>

    <div class="top-header">
        <div class="header-left">
            <div class="title-area"><h2 id="vc-title">Voice Chat</h2></div>
        </div>
        <div class="header-icons">
            <i class="fa-solid fa-desktop" onclick="showToast('Screen sharing not active')"></i>
            <i class="fa-solid fa-ellipsis-vertical" onclick="showToast('Menu opened')"></i>
        </div>
    </div>

    <div class="participant-list" id="participant-list">
        <div class="participant-item" id="my-row">
            <div class="avatar" id="my-avatar-container" style="background-color: var(--tg-blue);">
                <span id="my-avatar-text">U</span>
            </div>
            <div class="info">
                <span class="name" id="my-name">User</span>
                <span class="status" id="my-status">this is you</span>
            </div>
            <i class="fa-solid fa-microphone-slash mic-icon" id="my-list-mic"></i>
        </div>

        <div class="invite-row" onclick="copyInviteLink()">
            <i class="fa-solid fa-user-plus"></i>
            <span>Invite Members</span>
        </div>
    </div>

    <div class="floating-messages" id="message-container"></div>

    <div class="bottom-controls" id="main-controls">
        <div class="control-btn-wrap">
            <button class="control-btn" id="speaker-btn" onclick="toggleSpeaker()">
                <i class="fa-solid fa-volume-high" id="speaker-icon"></i>
            </button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn main-mic state-muted" id="main-mic-btn" onclick="toggleMainMic()">
                <i class="fa-solid fa-user" id="main-mic-icon"></i>
            </button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn" onclick="openChat()"><i class="fa-solid fa-message"></i></button>
        </div>
        <div class="control-btn-wrap">
            <button class="control-btn leave" onclick="leaveSession()"><i class="fa-solid fa-phone-slash"></i></button>
        </div>
    </div>

    <form class="chat-input-area hidden" id="chat-box" onsubmit="sendMessage(event)">
        <i class="fa-regular fa-face-smile" onclick="closeChat()"></i>
        <input type="text" id="chat-input" placeholder="Message" oninput="checkInput()">
        <button type="submit" class="send-btn" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
    </form>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.setHeaderColor('#181d22');
        const haptic = tg.HapticFeedback;

        function setViewportHeight() { 
            let vh = (tg.viewportHeight || window.innerHeight) * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`); 
        }
        tg.onEvent('viewportChanged', setViewportHeight);
        window.addEventListener('resize', setViewportHeight); setViewportHeight();

        // TELEGRAM USER DATA
        let currentUser = "User";
        let currentInitial = "U";
        let photoUrl = null;

        const user = tg.initDataUnsafe?.user;
        if (user) {
            currentUser = user.first_name; currentInitial = currentUser.charAt(0).toUpperCase(); photoUrl = user.photo_url; 
            document.getElementById('my-name').innerText = currentUser;
            const avatarContainer = document.getElementById('my-avatar-container');
            if (photoUrl) {
                avatarContainer.style.backgroundColor = "transparent"; 
                avatarContainer.innerHTML = `<img src="${photoUrl}" style="width: 100%; height: 100%; object-fit: cover;">`;
            } else { avatarContainer.innerHTML = `<span id="my-avatar-text">${currentInitial}</span>`; }
        }

        let toastTimeout;
        function showToast(msg) {
            try { if(haptic) haptic.impactOccurred('light'); } catch(e){}
            const toast = document.getElementById('toast-msg'); toast.innerText = msg; toast.classList.add('show');
            clearTimeout(toastTimeout); toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        /* --- PEER JS VOICE ENGINE (0 API Key Required) --- */
        let peer;
        let myPeerId = null;
        let localStream = null;
        let isLive = false;
        
        // Setup Peer Connection
        function initVoiceChat() {
            peer = new Peer(); // Auto-connects to free public server

            peer.on('open', function(id) {
                myPeerId = id;
                console.log('My ID is: ' + id);
                showToast("Connected to Voice Server!");

                // Check if joining someone else's room
                const urlParams = new URLSearchParams(window.location.search);
                const roomToJoin = urlParams.get('room');
                
                if (roomToJoin) {
                    // Start Mic automatically for guest and call the host
                    startMicAndCall(roomToJoin);
                }
            });

            // When someone calls us
            peer.on('call', function(call) {
                // Answer automatically if we have a mic, otherwise answer without mic
                if (localStream) {
                    call.answer(localStream);
                } else {
                    // Try to get mic silently to answer
                    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                        localStream = stream;
                        syncMicUI(false); // keep UI muted visually but stream is active (audio track disabled)
                        localStream.getAudioTracks()[0].enabled = false;
                        call.answer(localStream);
                    }).catch(err => {
                        console.log("No mic available to answer");
                    });
                }
                
                // Handle the remote stream
                call.on('stream', function(remoteStream) {
                    playRemoteStream(remoteStream, call.peer);
                });
                call.on('close', function() { removeRemoteUser(call.peer); });
            });
        }

        // Play remote audio
        function playRemoteStream(remoteStream, peerId) {
            if(!document.getElementById('audio-' + peerId)) {
                const audioObj = document.createElement('audio');
                audioObj.id = 'audio-' + peerId;
                audioObj.srcObject = remoteStream;
                audioObj.autoplay = true;
                document.body.appendChild(audioObj);
                
                // Show in UI
                renderRemoteUser(peerId, "Friend_" + peerId.substring(0,4), true);
            }
        }

        // Call the Host
        function startMicAndCall(hostId) {
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                localStream = stream;
                localStream.getAudioTracks()[0].enabled = false; // Muted by default
                
                const call = peer.call(hostId, localStream);
                call.on('stream', function(remoteStream) {
                    playRemoteStream(remoteStream, hostId);
                });
            }).catch(err => {
                showToast("Please allow microphone access");
            });
        }

        // Render Guest in UI
        function renderRemoteUser(uid, name, isMuted) {
            if(document.getElementById(`user-${uid}`)) return;
            const list = document.getElementById('participant-list');
            const row = document.createElement('div');
            row.className = 'participant-item';
            row.id = `user-${uid}`;
            row.innerHTML = `
                <div class="avatar" style="background-color: #ff8e8e;"><span>${name.charAt(0)}</span></div>
                <div class="info">
                    <span class="name">${name}</span>
                    <span class="status speaking" id="status-${uid}">listening</span>
                </div>
                <i class="fa-solid fa-microphone green mic-icon" id="mic-${uid}"></i>
            `;
            list.insertBefore(row, list.lastElementChild);
        }

        function removeRemoteUser(uid) {
            const el = document.getElementById(`user-${uid}`);
            if(el) el.remove();
            const audioEl = document.getElementById('audio-' + uid);
            if(audioEl) audioEl.remove();
        }

        // Start Engine
        initVoiceChat();

        /* --- MIC TOGGLE LOGIC --- */
        async function toggleMainMic() {
            try { if(haptic) haptic.impactOccurred('medium'); } catch(e){}
            isLive = !isLive;

            if (isLive) {
                // If stream doesn't exist, get it
                if (!localStream) {
                    try {
                        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        syncMicUI(true);
                    } catch(err) {
                        isLive = false;
                        showToast("Mic Permission Denied!");
                    }
                } else {
                    localStream.getAudioTracks()[0].enabled = true;
                    syncMicUI(true);
                }
            } else {
                if (localStream) localStream.getAudioTracks()[0].enabled = false;
                syncMicUI(false);
            }
        }

        function syncMicUI(live) {
            const btn = document.getElementById('main-mic-btn');
            const icon = document.getElementById('main-mic-icon');
            const listMic = document.getElementById('my-list-mic');
            const statusText = document.getElementById('my-status');

            if (live) {
                btn.className = 'control-btn main-mic state-live'; icon.className = 'fa-solid fa-microphone';
                listMic.className = 'fa-solid fa-microphone mic-icon green';
                statusText.innerText = 'speaking'; statusText.className = 'status speaking';
            } else {
                btn.className = 'control-btn main-mic state-muted'; icon.className = 'fa-solid fa-user';
                listMic.className = 'fa-solid fa-microphone-slash mic-icon';
                statusText.innerText = 'this is you'; statusText.className = 'status';
            }
        }

        let isSpeakerHigh = true;
        function toggleSpeaker() {
            try { if(haptic) haptic.selectionChanged(); } catch(e){}
            isSpeakerHigh = !isSpeakerHigh;
            document.getElementById('speaker-icon').className = isSpeakerHigh ? 'fa-solid fa-volume-high' : 'fa-solid fa-volume-low';
            showToast(isSpeakerHigh ? "Speaker ON" : "Earpiece ON");
        }

        function leaveSession() {
            try { if(haptic) haptic.impactOccurred('heavy'); } catch(e){}
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (peer) peer.destroy();
            tg.close();
        }

        // --- INVITE LINK (PEER JS ROOM LOGIC) ---
        function copyInviteLink() {
            try { if(haptic) haptic.selectionChanged(); } catch(e){}
            
            if(!myPeerId) {
                showToast("Connecting to server, please wait...");
                return;
            }

            // Generate link with the current Host's Peer ID
            const inviteLink = `${window.location.origin}${window.location.pathname}?room=${myPeerId}`;
            
            const textarea = document.createElement("textarea");
            textarea.value = inviteLink;
            textarea.style.position = "fixed";
            document.body.appendChild(textarea);
            textarea.select();
            try {
                var successful = document.execCommand('copy');
                if(successful) showToast("Invite link copied to clipboard!");
                else navigator.clipboard.writeText(inviteLink).then(() => showToast("Invite link copied!"));
            } catch (err) { alert("Copy this link: " + inviteLink); }
            document.body.removeChild(textarea);
        }

        /* --- CHAT LOGIC --- */
        const chatBox = document.getElementById('chat-box');
        const mainControls = document.getElementById('main-controls');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const msgContainer = document.getElementById('message-container');

        function openChat() { mainControls.classList.add('hidden'); chatBox.classList.remove('hidden'); chatInput.focus(); }
        function closeChat() { chatInput.blur(); window.focus(); setTimeout(() => { chatBox.classList.add('hidden'); mainControls.classList.remove('hidden'); sendBtn.style.display = 'none'; }, 100); }
        function checkInput() { sendBtn.style.display = chatInput.value.trim() !== '' ? 'block' : 'none'; }
        document.getElementById('participant-list').addEventListener('click', () => { if(!chatBox.classList.contains('hidden')) closeChat(); });

        function sendMessage(e) {
            e.preventDefault(); const text = chatInput.value.trim(); if(text === '') return;
            try { if(haptic) haptic.impactOccurred('light'); } catch(e){}
            const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
            bubble.innerHTML = `<div class="small-avatar" style="${photoUrl ? 'background-color: transparent;' : 'background-color: var(--tg-blue);'}">
                ${photoUrl ? `<img src="${photoUrl}" style="width: 100%; height: 100%; object-fit: cover;">` : currentInitial}</div>
                <span><b>${currentUser}</b> ${text}</span>`;
            msgContainer.appendChild(bubble); chatInput.value = ''; closeChat();
            setTimeout(() => { bubble.style.opacity = '0'; setTimeout(() => bubble.remove(), 300);
